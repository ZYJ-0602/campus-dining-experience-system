<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 食堂点评管理后台</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c757d;
            --primary-light: #f8f9fa;
            --text-dark: #333;
            --bg-color: #f8f9fa;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .navbar-custom {
            background-color: #343a40;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-title {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            border-left: 1px solid rgba(255,255,255,0.3);
            padding-left: 15px;
            margin-left: 15px;
        }

        .navbar-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            background-color: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 20px;
            padding: 5px 15px 5px 35px;
            font-size: 14px;
            width: 250px;
            transition: all 0.3s;
        }

        .search-input:focus {
            background-color: #fff;
            color: #333;
            width: 300px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .search-input:focus + .search-icon {
            color: #666;
        }

        /* 主要内容区域 */
        .main-content {
            padding: 20px;
            flex: 1;
        }

        .card-custom {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: none;
        }

        .card-header-custom {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 表格样式 */
        .table-custom th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }

        .table-custom td {
            vertical-align: middle;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-active {
            background-color: #e6f7e9;
            color: #28a745;
        }

        .status-disabled {
            background-color: #f8d7da;
            color: #dc3545;
        }

        /* 批量操作栏 */
        .batch-actions {
            padding: 10px 20px;
            background-color: #e9ecef;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none; /* 默认隐藏，选中后显示 */
            align-items: center;
            gap: 15px;
        }
        
        .batch-actions.show {
            display: flex;
        }

        /* 分页 */
        .pagination {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部导航栏 -->
    <div class="navbar-custom">
        <div class="d-flex align-items-center">
            <a href="#" class="navbar-brand">
                <i class="bi bi-gear-fill"></i>
                食堂点评管理后台
            </a>
            <span class="navbar-title">用户管理</span>
        </div>
        <div class="navbar-actions">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索用户名/手机号...">
                <i class="bi bi-search search-icon"></i>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openAddUserModal()">
                <i class="bi bi-person-plus-fill me-1"></i> 新增用户
            </button>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="main-content">
        <div class="container-fluid">
            
            <!-- 批量操作栏 -->
            <div class="batch-actions" id="batchActions">
                <span class="fw-bold text-secondary">已选 <span id="selectedCount">0</span> 项：</span>
                <button class="btn btn-outline-success btn-sm" onclick="batchOperate('enable')">
                    <i class="bi bi-check-circle"></i> 批量启用
                </button>
                <button class="btn btn-outline-warning btn-sm" onclick="batchOperate('disable')">
                    <i class="bi bi-slash-circle"></i> 批量禁用
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="batchOperate('delete')">
                    <i class="bi bi-trash"></i> 批量删除
                </button>
            </div>

            <!-- 用户列表卡片 -->
            <div class="card card-custom">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 50px;" class="text-center">
                                        <input type="checkbox" class="form-check-input" id="selectAll" onclick="toggleSelectAll()">
                                    </th>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>手机号</th>
                                    <th>角色</th>
                                    <th>注册时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- 数据动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3">
                    <div class="text-muted small">共 <span id="totalUsers">0</span> 条记录</div>
                    <nav>
                        <ul class="pagination pagination-sm" id="pagination">
                            <!-- 分页动态生成 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑用户弹窗 -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userModalTitle">新增用户</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <div class="mb-3">
                            <label class="form-label">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="formUsername" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号 <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="formPhone" required pattern="[0-9]{11}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">初始密码</label>
                            <input type="text" class="form-control" value="123456" disabled readonly>
                            <div class="form-text">默认密码为 123456</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色 <span class="text-danger">*</span></label>
                            <select class="form-select" id="formRole" onchange="toggleCanteenSelect()">
                                <option value="普通用户">普通用户</option>
                                <option value="食堂运营">食堂运营</option>
                                <option value="管理员">管理员</option>
                            </select>
                        </div>
                        <div class="mb-3" id="canteenSelectGroup" style="display: none;">
                            <label class="form-label">关联食堂 <span class="text-danger">*</span></label>
                            <select class="form-select" id="formCanteen">
                                <option value="">请选择食堂</option>
                                <option value="北区食堂">北区食堂</option>
                                <option value="南区食堂">南区食堂</option>
                                <option value="西区食堂">西区食堂</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 模拟数据源
        const mockUsers = [
            { id: 1, username: "admin", phone: "13800000000", role: "管理员", register_time: "2023-12-01 10:00", status: "启用", canteen: "" },
            { id: 2, username: "xiaoming", phone: "13800138001", role: "普通用户", register_time: "2024-01-01 12:30", status: "启用", canteen: "" },
            { id: 3, username: "zhangsan", phone: "13800138002", role: "食堂运营", register_time: "2024-01-02 09:15", status: "启用", canteen: "北区食堂" },
            { id: 4, username: "lisi", phone: "13800138003", role: "普通用户", register_time: "2024-01-03 14:20", status: "禁用", canteen: "" },
            { id: 5, username: "wangwu", phone: "13800138004", role: "普通用户", register_time: "2024-01-04 11:00", status: "启用", canteen: "" },
            { id: 6, username: "zhaoliu", phone: "13800138005", role: "食堂运营", register_time: "2024-01-05 16:45", status: "启用", canteen: "南区食堂" },
            { id: 7, username: "qianqi", phone: "13800138006", role: "普通用户", register_time: "2024-01-06 08:30", status: "启用", canteen: "" },
            { id: 8, username: "sunba", phone: "13800138007", role: "普通用户", register_time: "2024-01-07 19:20", status: "禁用", canteen: "" },
            { id: 9, username: "zhoujiu", phone: "13800138008", role: "普通用户", register_time: "2024-01-08 13:10", status: "启用", canteen: "" },
            { id: 10, username: "wushi", phone: "13800138009", role: "普通用户", register_time: "2024-01-09 10:05", status: "启用", canteen: "" },
            { id: 11, username: "zhengshi", phone: "13800138010", role: "普通用户", register_time: "2024-01-10 15:50", status: "启用", canteen: "" },
            { id: 12, username: "testuser", phone: "13800138011", role: "普通用户", register_time: "2024-01-11 09:40", status: "启用", canteen: "" }
        ];

        let currentUsers = [...mockUsers];
        let currentPage = 1;
        const pageSize = 10;
        let selectedIds = new Set();

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderTable();
            setupSearch();
        });

        // 1. 渲染表格
        function renderTable() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = currentUsers.slice(start, end);
            const tbody = document.getElementById('userTableBody');
            
            document.getElementById('totalUsers').textContent = currentUsers.length;
            renderPagination();

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">暂无数据</td></tr>';
                return;
            }

            let html = '';
            pageData.forEach(user => {
                const isChecked = selectedIds.has(user.id) ? 'checked' : '';
                const statusClass = user.status === '启用' ? 'status-active' : 'status-disabled';
                const statusBtnIcon = user.status === '启用' ? 'bi-slash-circle' : 'bi-check-circle';
                const statusBtnText = user.status === '启用' ? '禁用' : '启用';
                const statusBtnClass = user.status === '启用' ? 'text-warning' : 'text-success';
                const statusAction = user.status === '启用' ? 'disable' : 'enable';

                html += `
                    <tr>
                        <td class="text-center">
                            <input type="checkbox" class="form-check-input user-checkbox" value="${user.id}" ${isChecked} onclick="toggleSelect(${user.id})">
                        </td>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.phone}</td>
                        <td>
                            ${user.role}
                            ${user.canteen ? `<br><small class="text-muted">(${user.canteen})</small>` : ''}
                        </td>
                        <td>${user.register_time}</td>
                        <td><span class="status-badge ${statusClass}">${user.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-link ${statusBtnClass} text-decoration-none p-0 me-2" onclick="changeStatus(${user.id}, '${statusAction}')" title="${statusBtnText}">
                                <i class="bi ${statusBtnIcon}"></i>
                            </button>
                            <button class="btn btn-sm btn-link text-primary text-decoration-none p-0 me-2" onclick="resetPassword(${user.id})" title="重置密码">
                                <i class="bi bi-key"></i>
                            </button>
                            <button class="btn btn-sm btn-link text-secondary text-decoration-none p-0" onclick="viewHistory(${user.id})" title="查看记录">
                                <i class="bi bi-clock-history"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
            updateBatchActions();
        }

        // 2. 搜索逻辑
        function setupSearch() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', function(e) {
                const keyword = e.target.value.toLowerCase().trim();
                if (keyword.length >= 2 || keyword.length === 0) {
                    if (keyword === '') {
                        currentUsers = [...mockUsers];
                    } else {
                        currentUsers = mockUsers.filter(u => 
                            u.username.toLowerCase().includes(keyword) || 
                            u.phone.includes(keyword)
                        );
                    }
                    currentPage = 1;
                    selectedIds.clear();
                    renderTable();
                }
            });
        }

        // 3. 全选/单选逻辑
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.user-checkbox');
            
            checkboxes.forEach(cb => {
                cb.checked = selectAll.checked;
                const id = parseInt(cb.value);
                if (selectAll.checked) {
                    selectedIds.add(id);
                } else {
                    selectedIds.delete(id);
                }
            });
            updateBatchActions();
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateBatchActions();
            
            // 更新全选框状态
            const checkboxes = document.querySelectorAll('.user-checkbox');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            document.getElementById('selectAll').checked = allChecked;
        }

        function updateBatchActions() {
            const batchBar = document.getElementById('batchActions');
            const countSpan = document.getElementById('selectedCount');
            
            if (selectedIds.size > 0) {
                batchBar.classList.add('show');
                countSpan.textContent = selectedIds.size;
            } else {
                batchBar.classList.remove('show');
            }
        }

        // 4. 用户操作（禁用/启用/重置密码）
        function changeStatus(id, action) {
            const user = mockUsers.find(u => u.id === id);
            if (!user) return;
            
            const newStatus = action === 'enable' ? '启用' : '禁用';
            const confirmMsg = `确定要${newStatus}用户 "${user.username}" 吗？`;
            
            if (confirm(confirmMsg)) {
                user.status = newStatus;
                // 更新当前视图数据
                const currentUserIndex = currentUsers.findIndex(u => u.id === id);
                if (currentUserIndex !== -1) currentUsers[currentUserIndex].status = newStatus;
                renderTable();
                // 模拟API调用提示
                // alert("操作成功"); 
            }
        }

        function resetPassword(id) {
            const user = mockUsers.find(u => u.id === id);
            if (confirm(`确定要重置用户 "${user.username}" 的密码吗？`)) {
                alert(`重置成功！\n用户 "${user.username}" 的新密码为：123456`);
            }
        }
        
        function viewHistory(id) {
            alert(`跳转到用户ID:${id} 的行为记录页（待开发）`);
        }

        // 5. 批量操作
        function batchOperate(action) {
            if (selectedIds.size === 0) return;
            
            let actionText = '';
            if (action === 'enable') actionText = '启用';
            else if (action === 'disable') actionText = '禁用';
            else if (action === 'delete') actionText = '删除';

            if (confirm(`确定要批量${actionText}选中的 ${selectedIds.size} 个用户吗？`)) {
                // 模拟批量处理
                const ids = Array.from(selectedIds);
                
                if (action === 'delete') {
                    // 仅演示：过滤掉未禁用的不可删除（假设业务逻辑）
                    const canDelete = ids.filter(id => {
                        const u = mockUsers.find(user => user.id === id);
                        return u && u.status === '禁用';
                    });
                    
                    if (canDelete.length !== ids.length) {
                        alert(`部分用户处于启用状态，不可删除！\n成功删除 ${canDelete.length} 个禁用用户。`);
                    } else {
                        alert("批量删除成功！");
                    }
                    
                    // 实际删除逻辑（更新mock数据）
                    canDelete.forEach(id => {
                        const idx = mockUsers.findIndex(u => u.id === id);
                        if (idx !== -1) mockUsers.splice(idx, 1);
                    });
                } else {
                    const newStatus = action === 'enable' ? '启用' : '禁用';
                    ids.forEach(id => {
                        const user = mockUsers.find(u => u.id === id);
                        if (user) user.status = newStatus;
                    });
                    alert(`批量${actionText}成功！`);
                }

                // 刷新数据
                currentUsers = [...mockUsers]; // 重新获取最新数据
                selectedIds.clear();
                document.getElementById('selectAll').checked = false;
                renderTable();
            }
        }

        // 6. 新增用户
        function openAddUserModal() {
            document.getElementById('userForm').reset();
            toggleCanteenSelect(); // 重置关联食堂显示
            const modal = new bootstrap.Modal(document.getElementById('userModal'));
            modal.show();
        }

        function toggleCanteenSelect() {
            const role = document.getElementById('formRole').value;
            const group = document.getElementById('canteenSelectGroup');
            if (role === '食堂运营') {
                group.style.display = 'block';
                document.getElementById('formCanteen').required = true;
            } else {
                group.style.display = 'none';
                document.getElementById('formCanteen').required = false;
            }
        }

        function saveUser() {
            const form = document.getElementById('userForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const username = document.getElementById('formUsername').value;
            const phone = document.getElementById('formPhone').value;
            const role = document.getElementById('formRole').value;
            const canteen = role === '食堂运营' ? document.getElementById('formCanteen').value : '';

            // 模拟保存
            const newUser = {
                id: mockUsers.length + 1,
                username: username,
                phone: phone,
                role: role,
                canteen: canteen,
                register_time: new Date().toLocaleString().replace(/\//g, "-").substring(0, 16),
                status: "启用"
            };
            
            mockUsers.unshift(newUser); // 添加到开头
            currentUsers = [...mockUsers];
            
            // 关闭弹窗并刷新
            const modalEl = document.getElementById('userModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
            
            currentPage = 1;
            renderTable();
            alert("用户新增成功！默认密码：123456");
        }

        // 分页渲染
        function renderPagination() {
            const totalPages = Math.ceil(currentUsers.length / pageSize);
            const container = document.getElementById('pagination');
            
            let html = `
                <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <button class="page-link" onclick="changePage(${currentPage - 1})">&laquo;</button>
                </li>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                html += `
                    <li class="page-item ${currentPage === i ? 'active' : ''}">
                        <button class="page-link" onclick="changePage(${i})">${i}</button>
                    </li>
                `;
            }
            
            html += `
                <li class="page-item ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}">
                    <button class="page-link" onclick="changePage(${currentPage + 1})">&raquo;</button>
                </li>
            `;
            
            container.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(currentUsers.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }
    </script>
</body>
</html>
