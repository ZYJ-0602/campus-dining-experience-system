<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>意见反馈 - 校园食堂点评系统</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9933;
            --primary-hover: #f08f2d;
        }

        body {
            background: #f9f9f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-bottom: 16px;
        }

        .header-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 52px;
            background: linear-gradient(135deg, #ff9933 0%, #ffb366 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
        }

        .back-btn {
            color: #fff;
            font-size: 22px;
            text-decoration: none;
        }

        .page-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .container-wrap {
            padding: 12px 12px 0;
        }

        .field-wrap {
            position: relative;
            width: 100%;
            margin-bottom: 14px;
        }

        .form-control {
            border-radius: 4px;
            width: 100%;
            min-height: 40px;
            height: 40px;
            padding: 10px 10px 10px 44px;
            font-size: 14px;
            border: 1px solid #ddd;
            background: #fff;
        }

        textarea.form-control {
            min-height: 110px;
            height: 110px;
            padding-top: 10px;
            resize: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 153, 51, 0.12);
        }

        .field-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b8b8b8;
            width: 20px;
            height: 20px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
            background: transparent;
        }

        .field-wrap.textarea-wrap .field-icon {
            top: 20px;
            transform: none;
        }

        .upload-wrap {
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            padding: 10px;
            margin-bottom: 14px;
        }

        .upload-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .upload-title {
            font-size: 13px;
            color: #666;
            margin: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-upload-custom {
            background-color: var(--primary-color);
            border: none;
            color: #fff;
            border-radius: 4px;
            font-size: 12px;
            padding: 5px 10px;
            line-height: 1.2;
        }

        .btn-upload-custom:hover {
            background-color: var(--primary-hover);
        }

        .upload-tip {
            font-size: 12px;
            color: #999;
            margin: 0 0 8px;
        }

        .upload-preview-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .preview-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #eee;
            height: 78px;
            background: #f6f6f6;
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn-remove-image {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 12px;
            line-height: 20px;
            padding: 0;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 4px;
            min-height: 40px;
            height: 40px;
            padding: 9px 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            display: block;
            margin-top: 4px;
            transition: all 0.2s;
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .history-wrap {
            margin-top: 14px;
            border-top: 1px solid #f0f0f0;
            padding-top: 14px;
        }

        .history-title {
            margin: 0 0 10px;
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .history-list {
            max-height: 220px;
            overflow-y: auto;
        }

        .history-item {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 10px 11px;
            margin-bottom: 8px;
            background: #fff;
        }

        .history-content {
            font-size: 13px;
            color: #333;
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .history-meta {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="user_center.html" class="back-btn" aria-label="返回"><i class="bi bi-chevron-left"></i></a>
        <h1 class="page-title">意见反馈</h1>
        <span style="width:22px;"></span>
    </div>

    <div class="container-wrap">
        <form id="feedbackForm">
            <div class="field-wrap textarea-wrap">
                <span class="field-icon"><i class="bi bi-chat-left-text"></i></span>
                <textarea id="feedbackContent" class="form-control" maxlength="1000" placeholder="请描述问题或建议（至少5个字）" required></textarea>
            </div>
            <div class="field-wrap">
                <span class="field-icon"><i class="bi bi-telephone"></i></span>
                <input id="feedbackContact" class="form-control" maxlength="120" placeholder="联系方式（选填）">
            </div>
            <div class="upload-wrap">
                <div class="upload-top">
                    <p class="upload-title"><i class="bi bi-images"></i>上传图片</p>
                    <button type="button" class="btn-upload-custom" onclick="triggerImageSelect()">选择图片</button>
                </div>
                <p class="upload-tip">支持 1-3 张问题配图，可预览和删除。</p>
                <input type="file" id="feedbackImages" accept="image/*" multiple style="display:none">
                <div id="uploadPreview" class="upload-preview-list"></div>
            </div>
            <button type="submit" class="btn btn-primary-custom" id="submitBtn">提 交 反 馈</button>
        </form>

        <div class="history-wrap">
            <div class="history-title">反馈记录</div>
            <div class="history-list" id="historyList">
                <div class="text-secondary small">加载中...</div>
            </div>
        </div>
    </div>

    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const uploadedImages = [];

        document.addEventListener('DOMContentLoaded', async function() {
            const meRes = await fetchApi(API.AUTH_ME);
            if (meRes.code !== 200) {
                alert('请先登录');
                window.location.href = '/login';
                return;
            }
            const me = meRes.data || {};
            document.getElementById('feedbackContact').value = me.phone || '';
            document.getElementById('feedbackImages').addEventListener('change', handleImageSelect);
            renderUploadPreview();
            await loadHistory();
        });

        function triggerImageSelect() {
            document.getElementById('feedbackImages').click();
        }

        function handleImageSelect(e) {
            const files = Array.from(e.target.files || []);
            if (!files.length) {
                return;
            }

            for (const file of files) {
                if (uploadedImages.length >= 3) {
                    alert('最多上传 3 张图片');
                    break;
                }
                if (!file.type.startsWith('image/')) {
                    continue;
                }
                if (file.size > 3 * 1024 * 1024) {
                    alert(`图片 ${file.name} 超过 3MB，已跳过`);
                    continue;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const src = ev.target && ev.target.result ? String(ev.target.result) : '';
                    if (!src) {
                        return;
                    }
                    uploadedImages.push(src);
                    renderUploadPreview();
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        }

        function removeUploadedImage(index) {
            uploadedImages.splice(index, 1);
            renderUploadPreview();
        }

        function renderUploadPreview() {
            const box = document.getElementById('uploadPreview');
            if (!uploadedImages.length) {
                box.innerHTML = '<div class="text-secondary small">未上传图片</div>';
                return;
            }

            box.innerHTML = uploadedImages.map((src, index) => `
                <div class="preview-item">
                    <img src="${src}" alt="上传图片${index + 1}">
                    <button type="button" class="btn-remove-image" onclick="removeUploadedImage(${index})" aria-label="删除">×</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadHistory() {
            const res = await fetchApi(API.FEEDBACK);
            const list = document.getElementById('historyList');

            if (res.code !== 200 || !Array.isArray(res.data) || res.data.length === 0) {
                list.innerHTML = '<div class="text-secondary small">暂无反馈记录</div>';
                return;
            }

            list.innerHTML = res.data.map(item => `
                <div class="history-item">
                    <div class="history-content">${escapeHtml(item.content)}</div>
                    <div class="history-meta">${escapeHtml(item.created_time)} | 状态：${escapeHtml(item.status)}</div>
                </div>
            `).join('');
        }

        document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            const payload = {
                content: document.getElementById('feedbackContent').value.trim(),
                contact: document.getElementById('feedbackContact').value.trim()
            };

            const res = await fetchApi(API.FEEDBACK, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            btn.disabled = false;
            btn.textContent = '提 交 反 馈';

            if (res.code !== 200) {
                alert(res.msg || '提交失败');
                return;
            }

            alert('反馈已提交');
            document.getElementById('feedbackContent').value = '';
            uploadedImages.length = 0;
            renderUploadPreview();
            await loadHistory();
        });
    </script>
</body>
</html>
