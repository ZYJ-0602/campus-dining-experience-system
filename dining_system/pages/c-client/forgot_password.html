<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 校园食堂点评系统</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF7F24;
            --primary-hover: #ff9248;
            --bg-gradient: linear-gradient(135deg, #FF7F24 0%, #FFB07C 100%);
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card-custom {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
        }

        .card-header-custom {
            background: var(--bg-gradient);
            padding: 25px 20px;
            text-align: center;
            color: #fff;
        }

        .card-body-custom {
            padding: 30px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            border-color: #eee;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 127, 36, 0.15);
        }

        .input-group-text {
            background: #fff;
            border-color: #eee;
            border-radius: 8px 0 0 8px;
            color: #999;
        }

        .btn-send-code {
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary-custom:active {
            transform: translateY(0);
        }

        .password-toggle {
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link-primary {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
    <link href="../../static/css/common.css" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="card card-custom">
            <div class="card-header-custom">
                <h4 class="m-0">找回密码</h4>
            </div>

            <div class="card-body-custom">
                <form id="resetForm">
                    <div class="mb-3">
                        <label class="form-label small text-muted">验证手机号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-phone"></i></span>
                            <input type="tel" class="form-control" id="resetPhone" placeholder="请输入注册手机号" required pattern="1[3-9]\d{9}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small text-muted">短信验证码</label>
                        <div class="row g-2">
                            <div class="col-7">
                                <input type="text" class="form-control" id="resetCode" placeholder="6位验证码" required maxlength="6">
                            </div>
                            <div class="col-5">
                                <button type="button" class="btn btn-outline-secondary w-100 btn-send-code" id="btnSendCode" onclick="sendSmsCode()">获取验证码</button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-muted">设置新密码</label>
                        <div class="input-group position-relative">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="newPassword" placeholder="新密码 (6-16位)" required minlength="6" maxlength="16">
                            <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle" onclick="togglePassword('newPassword', this)">
                                <i class="bi bi-eye-slash"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="input-group position-relative">
                            <span class="input-group-text"><i class="bi bi-check-lg"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="确认新密码" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-primary-custom">重置密码</button>
                </form>

                <div class="auth-footer">
                    <a href="login.html" class="link-primary"><i class="bi bi-arrow-left"></i> 返回登录</a>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4 text-muted small">
            &copy; 2026 校园食堂点评系统 · By 赵依洁
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/forgot_password.js"></script>
    <script src="../../static/js/common.js"></script>
</body>
</html>
