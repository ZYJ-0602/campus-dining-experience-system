<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑资料 - 校园食堂点评系统</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9933;
            --primary-hover: #f08f2d;
        }

        body {
            background: #f9f9f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding-bottom: 16px;
        }

        .header-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 52px;
            background: linear-gradient(135deg, #ff9933 0%, #ffb366 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
        }

        .back-btn {
            color: #fff;
            font-size: 22px;
            text-decoration: none;
        }

        .page-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .container-wrap {
            padding: 12px 12px 0;
        }

        .panel {
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
            padding: 2px 2px 0;
        }

        .form-row {
            margin-bottom: 14px;
        }

        .field-wrap {
            position: relative;
            width: 100%;
        }

        .form-control {
            border-radius: 4px;
            width: 100%;
            min-height: 40px;
            height: 40px;
            padding: 10px 10px 10px 44px;
            font-size: 14px;
            border: 1px solid #ddd;
            background: #fff;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 153, 51, 0.12);
        }

        .field-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b8b8b8;
            width: 20px;
            height: 20px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
            background: transparent;
        }

        .avatar-panel {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 72px;
            background: #fff;
        }

        .avatar-preview {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 1px solid #e6e6e6;
            object-fit: cover;
            background: #f2f2f2;
        }

        .avatar-meta {
            flex: 1;
            min-width: 0;
        }

        .avatar-filename {
            font-size: 12px;
            color: #888;
            margin: 0 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .avatar-actions {
            display: flex;
            gap: 8px;
        }

        .btn-upload {
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            background: #fff;
            border-radius: 4px;
            font-size: 12px;
            padding: 4px 10px;
            line-height: 1.4;
        }

        .btn-upload:hover {
            background: rgba(255, 153, 51, 0.08);
        }

        .btn-clear {
            border: 1px solid #ddd;
            color: #666;
            background: #fff;
            border-radius: 4px;
            font-size: 12px;
            padding: 4px 10px;
            line-height: 1.4;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 4px;
            min-height: 40px;
            height: 40px;
            padding: 9px 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            display: block;
            margin-top: 6px;
            transition: all 0.2s;
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .hint {
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="user_center.html" class="back-btn" aria-label="返回"><i class="bi bi-chevron-left"></i></a>
        <h1 class="page-title">编辑资料</h1>
        <span style="width:22px;"></span>
    </div>

    <div class="container-wrap">
        <div class="panel">
            <form id="profileForm">
                <div class="form-row">
                    <div class="field-wrap">
                        <span class="field-icon"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="nickname" placeholder="昵称（2-40字）" maxlength="40" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="field-wrap">
                        <span class="field-icon"><i class="bi bi-phone"></i></span>
                        <input type="tel" class="form-control" id="phone" placeholder="手机号（11位）" maxlength="11" pattern="1[3-9]\d{9}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="field-wrap">
                        <div class="avatar-panel">
                            <img id="avatarPreview" class="avatar-preview" src="https://via.placeholder.com/54/eeeeee/999999?text=+" alt="头像预览">
                            <div class="avatar-meta">
                                <p class="avatar-filename" id="avatarFilename">未选择本地图片</p>
                                <div class="avatar-actions">
                                    <button type="button" class="btn-upload" onclick="triggerAvatarSelect()">选择图片</button>
                                    <button type="button" class="btn-clear" onclick="clearAvatarSelection()">移除</button>
                                </div>
                            </div>
                        </div>
                        <input type="file" id="avatarFile" accept="image/*" style="display:none">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom" id="saveBtn">保 存</button>
            </form>
            <div class="hint">保存后将返回我的页面</div>
        </div>
    </div>

    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        let currentRemoteAvatar = '';
        let localAvatarDataUrl = '';

        document.addEventListener('DOMContentLoaded', initPage);

        async function initPage() {
            const meRes = await fetchApi(API.AUTH_ME);
            if (meRes.code !== 200) {
                alert('请先登录');
                window.location.href = '/login';
                return;
            }
            const user = meRes.data || {};
            document.getElementById('nickname').value = user.nickname || user.username || '';
            document.getElementById('phone').value = user.phone || '';
            currentRemoteAvatar = user.avatar || '';

            const cached = localStorage.getItem('user_avatar_local') || '';
            if (cached) {
                applyAvatarPreview(cached, '本地头像已选择');
                localAvatarDataUrl = cached;
            } else if (currentRemoteAvatar) {
                applyAvatarPreview(currentRemoteAvatar, '当前头像');
            }

            document.getElementById('avatarFile').addEventListener('change', handleAvatarFileChange);
        }

        function triggerAvatarSelect() {
            document.getElementById('avatarFile').click();
        }

        function applyAvatarPreview(src, label) {
            document.getElementById('avatarPreview').src = src || 'https://via.placeholder.com/54/eeeeee/999999?text=+';
            document.getElementById('avatarFilename').textContent = label || '未选择本地图片';
        }

        function clearAvatarSelection() {
            localAvatarDataUrl = '';
            document.getElementById('avatarFile').value = '';
            localStorage.removeItem('user_avatar_local');
            if (currentRemoteAvatar) {
                applyAvatarPreview(currentRemoteAvatar, '当前头像');
            } else {
                applyAvatarPreview('', '未选择本地图片');
            }
        }

        function handleAvatarFileChange(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) {
                return;
            }
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                e.target.value = '';
                return;
            }
            if (file.size > 3 * 1024 * 1024) {
                alert('图片大小不能超过 3MB');
                e.target.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target && ev.target.result ? String(ev.target.result) : '';
                if (!dataUrl) {
                    return;
                }
                localAvatarDataUrl = dataUrl;
                applyAvatarPreview(dataUrl, file.name);
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            const payload = {
                nickname: document.getElementById('nickname').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                avatar: currentRemoteAvatar
            };

            const res = await fetchApi(API.USER_PROFILE, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            btn.disabled = false;
            btn.textContent = '保 存';

            if (res.code !== 200) {
                alert(res.msg || '保存失败');
                return;
            }

            if (localAvatarDataUrl) {
                localStorage.setItem('user_avatar_local', localAvatarDataUrl);
            }

            localStorage.setItem('user', JSON.stringify(res.data || {}));
            alert('资料已更新');
            window.location.href = 'user_center.html';
        });
    </script>
</body>
</html>
