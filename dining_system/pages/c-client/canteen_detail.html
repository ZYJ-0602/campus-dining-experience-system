<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食堂详情</title>
    <!-- 引入 Bootstrap 5 CDN -->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #FF7A00; /* 核心橙色 */
            --bg-color: #f8f9fa;
        }
        
        body {
            background-color: var(--bg-color);
            padding-top: 50px; /* 顶部栏高度 */
            padding-bottom: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 1. 顶部栏 */
        .navbar-custom {
            background-color: #fff;
            height: 50px;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }
        
        .nav-title {
            font-size: 18px;
            font-weight: bold;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .nav-icon {
            font-size: 22px;
            color: #333;
            cursor: pointer;
            padding: 5px;
        }
        
        .star-active {
            color: #FFD700 !important; /* 金黄色 */
        }

        /* 2. 食堂概览 */
        .overview-card {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-icon {
            color: var(--primary-color);
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }

        #radarChart {
            width: 100%;
            height: 220px;
            margin: 10px 0;
        }
        
        .eval-count-btn {
            display: block;
            text-align: center;
            font-size: 13px;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            padding: 5px;
            margin-top: 5px;
            text-decoration: none;
        }

        /* 通用模块标题 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            margin-bottom: 10px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        
        .section-more {
            font-size: 12px;
            color: #999;
            text-decoration: none;
        }

        /* 3. 窗口列表 */
        .window-list {
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .window-card {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .window-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .window-meta {
            font-size: 12px;
            color: #666;
        }
        
        .window-score {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 4. 食安公示 */
        .safety-list {
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .safety-item {
            background: #fff;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .safety-item:first-child { border-radius: 8px 8px 0 0; }
        .safety-item:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
        
        .safety-icon {
            font-size: 20px;
            color: #28a745;
            margin-right: 10px;
        }

        /* 5. 关联笔记 (横向滚动) */
        .note-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 15px 15px;
            scroll-behavior: smooth;
        }
        
        .note-scroll::-webkit-scrollbar { display: none; }
        
        .note-card {
            flex: 0 0 140px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        
        .note-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        
        .note-info {
            padding: 8px;
        }
        
        .note-title {
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        
        .note-likes {
            font-size: 12px;
            color: #999;
        }

        /* 弹窗 */
        .modal-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content-custom {
            width: 85%;
            max-width: 350px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            padding: 20px;
            text-align: center;
        }

        .cert-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 10px;
            background: #f8f8f8;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #efefef;
            border-radius: 8px;
        }

        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.65), rgba(255,255,255,0));
            animation: shimmer 1.1s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .evaluation-list {
            padding: 0 15px;
            margin-bottom: 20px;
        }

        .evaluation-item {
            background: #fff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .score-chip {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 13px;
        }

        .status-ok { color: #28a745; }
        .status-expired { color: #dc3545; }

    </style>
    <link href="../../static/css/common.css" rel="stylesheet">
</head>
<body>

    <!-- 1. 顶部栏 -->
    <nav class="navbar navbar-custom fixed-top px-3 d-flex justify-content-between align-items-center">
        <i class="bi bi-chevron-left nav-icon" onclick="history.back()"></i>
        <div class="nav-title" id="navTitle">食堂详情</div>
        <i class="bi bi-star nav-icon" id="starBtn" onclick="toggleStar()"></i>
    </nav>

    <!-- 2. 食堂概览 -->
    <div class="overview-card">
        <div class="info-row">
            <i class="bi bi-geo-alt-fill info-icon"></i>
            <span id="canteenAddr">加载中...</span>
        </div>
        <div class="info-row">
            <i class="bi bi-clock-fill info-icon"></i>
            <span id="canteenTime">--</span>
        </div>
        
        <!-- 雷达图容器 -->
        <div id="radarChart"></div>
        
        <a href="#" class="eval-count-btn" onclick="alert('跳转评价列表')">
            查看全部 <span id="evalCount">0</span> 条评价 <i class="bi bi-chevron-right"></i>
        </a>
    </div>

    <!-- 3. 窗口列表 -->
    <div class="section-header">
        <div class="section-title">食堂窗口</div>
        <a href="#" class="section-more">全部 ></a>
    </div>
    <div class="window-list" id="windowList">
        <!-- 动态插入 -->
    </div>

    <!-- 4. 食安公示 -->
    <div class="section-header">
        <div class="section-title">食安公示</div>
        <a href="#" class="section-more" onclick="alert('跳转公示汇总页')">查看更多 ></a>
    </div>
    <div class="safety-list" id="safetyList">
        <!-- 动态插入 -->
    </div>

    <!-- 5. 关联笔记 -->
    <div class="section-header">
        <div class="section-title">用户分享</div>
    </div>
    <div class="note-scroll" id="noteList">
        <!-- 动态插入 -->
    </div>

    <!-- 食安详情弹窗 -->
    <div class="modal-custom" id="safetyModal">
        <div class="modal-content-custom">
            <h5 class="mb-3 fw-bold" id="modalTitle">证书详情</h5>
            <img src="" class="cert-img" id="modalImg">
            <div class="text-start fs-6 mb-3">
                <div>有效期至：<span id="modalDate">--</span></div>
                <div class="text-success mt-1"><i class="bi bi-check-circle-fill"></i> 状态正常</div>
            </div>
            <button class="btn btn-primary w-100" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const canteenName = decodeURIComponent((urlParams.get('name') || '北区食堂').trim());
        let currentCanteenId = null;
        let radarChartInstance = null;

        document.addEventListener('DOMContentLoaded', async function() {
            applySkeleton();
            ensureEvaluationSection();
            await bootstrapPage();
        });

        async function bootstrapPage() {
            const detailRes = await fetchApi(`${API_BASE_URL}/canteens/detail?name=${encodeURIComponent(canteenName)}`);
            if (detailRes.code !== 200 || !detailRes.data) {
                renderLoadError(detailRes.msg || '食堂信息加载失败');
                return;
            }

            const detail = detailRes.data;
            currentCanteenId = detail.id;
            renderCanteenDetail(detail);

            const [windowsRes, safetyRes, evalRes, sharesRes] = await Promise.all([
                fetchApi(`${API.WINDOWS}?canteen_id=${currentCanteenId}`),
                fetchApi(`${API_BASE_URL}/food-safety/notices?canteen_id=${currentCanteenId}`),
                fetchApi(`${API_BASE_URL}/evaluations?canteen_id=${currentCanteenId}`),
                fetchApi(`${API_BASE_URL}/user-shares?canteen_id=${currentCanteenId}`)
            ]);

            const evaluations = (evalRes.code === 200 && Array.isArray(evalRes.data)) ? evalRes.data : [];
            renderWindows((windowsRes.code === 200 && Array.isArray(windowsRes.data)) ? windowsRes.data : []);
            renderSafety((safetyRes.code === 200 && Array.isArray(safetyRes.data)) ? safetyRes.data : []);
            renderEvaluations(evaluations);
            renderShares((sharesRes.code === 200 && Array.isArray(sharesRes.data)) ? sharesRes.data : []);
            document.getElementById('evalCount').innerText = String(evaluations.length);

            initChart(evaluations);
        }

        function applySkeleton() {
            document.getElementById('canteenAddr').innerHTML = '<span class="skeleton" style="display:inline-block;width:180px;height:14px;"></span>';
            document.getElementById('canteenTime').innerHTML = '<span class="skeleton" style="display:inline-block;width:120px;height:14px;"></span>';

            document.getElementById('windowList').innerHTML = `
                <div class="window-card"><div class="skeleton" style="height:42px;width:100%;"></div></div>
                <div class="window-card"><div class="skeleton" style="height:42px;width:100%;"></div></div>
            `;
            document.getElementById('safetyList').innerHTML = `
                <div class="safety-item"><div class="skeleton" style="height:36px;width:100%;"></div></div>
                <div class="safety-item"><div class="skeleton" style="height:36px;width:100%;"></div></div>
            `;
            document.getElementById('noteList').innerHTML = `
                <div class="note-card"><div class="skeleton" style="height:100px;"></div><div class="note-info"><div class="skeleton" style="height:14px;"></div></div></div>
                <div class="note-card"><div class="skeleton" style="height:100px;"></div><div class="note-info"><div class="skeleton" style="height:14px;"></div></div></div>
            `;
        }

        function renderCanteenDetail(detail) {
            document.title = detail.name;
            document.getElementById('navTitle').innerText = detail.name;
            document.getElementById('canteenAddr').innerText = detail.address || '未知地址';
            document.getElementById('canteenTime').innerText = detail.business_hours || '--';
        }

        function initChart(evaluations) {
            if (!radarChartInstance) {
                radarChartInstance = echarts.init(document.getElementById('radarChart'));
                window.addEventListener('resize', () => radarChartInstance && radarChartInstance.resize());
            }

            const avg = calcAverageScore(evaluations);
            const scorePack = [avg, Math.max(0, avg - 0.3), Math.min(10, avg + 0.2), Math.min(10, avg + 0.4)];

            radarChartInstance.setOption({
                radar: {
                    indicator: [
                        { name: '食品口味', max: 10 },
                        { name: '环境卫生', max: 10 },
                        { name: '服务态度', max: 10 },
                        { name: '食安合规', max: 10 }
                    ],
                    radius: '70%',
                    splitNumber: 4,
                    splitArea: { areaStyle: { color: ['#fff', '#fff', '#fff', '#fff'] } },
                    axisLine: { lineStyle: { color: '#ddd' } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: scorePack,
                        name: '评分',
                        areaStyle: { color: 'rgba(255, 122, 0, 0.25)' },
                        lineStyle: { color: '#FF7A00', width: 2 },
                        itemStyle: { color: '#FF7A00' }
                    }]
                }]
            });
        }

        function renderWindows(windows) {
            const list = document.getElementById('windowList');
            list.innerHTML = '';
            if (!windows || windows.length === 0) {
                list.innerHTML = '<div class="text-center text-muted py-3 bg-white rounded">暂无窗口信息</div>';
                return;
            }

            windows.forEach(w => {
                const item = document.createElement('div');
                item.className = 'window-card';
                item.innerHTML = `
                    <div>
                        <div class="window-name">${escapeHtml(w.name)}</div>
                        <div class="window-meta">点击查看窗口详情</div>
                    </div>
                    <div class="text-end">
                        <div class="window-score"><i class="bi bi-chevron-right"></i></div>
                    </div>
                `;
                item.onclick = () => {
                    window.location.href = `dish_detail.html?window_id=${w.id}&canteen_id=${w.canteen_id || currentCanteenId}`;
                };
                list.appendChild(item);
            });
        }

        function renderSafety(notices) {
            const list = document.getElementById('safetyList');
            list.innerHTML = '';

            if (!notices || notices.length === 0) {
                list.innerHTML = '<div class="text-center text-muted py-3 bg-white rounded">暂无食安公示</div>';
                return;
            }

            notices.forEach(item => {
                const expireDate = item.expire_date || '';
                const expired = isExpired(expireDate);
                const statusCls = expired ? 'status-expired' : 'status-ok';
                const statusText = expired ? '已过期' : '有效';
                const iconColor = expired ? '#dc3545' : '#28a745';

                const row = document.createElement('div');
                row.className = 'safety-item';
                row.innerHTML = `
                    <i class="bi bi-shield-check safety-icon" style="color:${iconColor}"></i>
                    <div class="flex-grow-1">
                        <div class="fw-bold" style="font-size:14px;">${escapeHtml(item.title)}</div>
                        <div class="text-muted" style="font-size:12px;">有效期至：${escapeHtml(expireDate || '--')} <span class="${statusCls}">(${statusText})</span></div>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                `;
                row.onclick = () => showModal({
                    name: item.title,
                    valid_end: expireDate || '--',
                    img: item.image_url || 'https://via.placeholder.com/300x400?text=Notice',
                    expired: expired
                });
                list.appendChild(row);
            });
        }

        function ensureEvaluationSection() {
            if (document.getElementById('evaluationList')) return;

            const anchor = document.getElementById('safetyList');
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = '<div class="section-title">用户评价</div><a href="#" class="section-more" onclick="return false;">最新 ></a>';

            const list = document.createElement('div');
            list.className = 'evaluation-list';
            list.id = 'evaluationList';
            list.innerHTML = '<div class="evaluation-item"><div class="skeleton" style="height:48px;"></div></div>';

            anchor.parentNode.insertBefore(header, anchor.nextSibling);
            anchor.parentNode.insertBefore(list, header.nextSibling);
        }

        function renderEvaluations(evaluations) {
            const list = document.getElementById('evaluationList');
            if (!list) return;

            list.innerHTML = '';
            if (!evaluations || evaluations.length === 0) {
                list.innerHTML = '<div class="evaluation-item text-center text-muted">还没有评价，欢迎成为第一个评价者</div>';
                return;
            }

            evaluations.slice(0, 8).forEach(item => {
                const row = document.createElement('div');
                row.className = 'evaluation-item';
                row.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <div class="fw-bold" style="font-size:13px;">${escapeHtml(item.username || '校园用户')}</div>
                        <div class="score-chip">${Number(item.score || 0).toFixed(1)} 分</div>
                    </div>
                    <div style="font-size:13px;color:#555;line-height:1.5;">${escapeHtml(item.content || '未填写评价内容')}</div>
                    <div class="text-muted mt-1" style="font-size:12px;">${escapeHtml(formatTime(item.create_time))}</div>
                `;
                list.appendChild(row);
            });
        }

        function renderShares(shares) {
            const list = document.getElementById('noteList');
            list.innerHTML = '';

            if (!shares || shares.length === 0) {
                list.innerHTML = '<div class="text-muted">暂无用户分享</div>';
                return;
            }

            shares.forEach(item => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <img src="${escapeAttr(item.image_url || 'https://via.placeholder.com/140x100?text=Share')}" class="note-img" alt="分享图">
                    <div class="note-info">
                        <div class="note-title">${escapeHtml(item.username || '校园用户')}</div>
                        <div class="note-likes">${escapeHtml((item.content || '').slice(0, 24) || '这条分享暂无文案')}</div>
                    </div>
                `;
                card.onclick = () => showSharePreview(item);
                list.appendChild(card);
            });
        }

        function renderLoadError(msg) {
            document.getElementById('canteenAddr').innerText = msg;
            document.getElementById('canteenTime').innerText = '--';
            document.getElementById('windowList').innerHTML = '<div class="text-center text-muted py-3 bg-white rounded">加载失败，请稍后重试</div>';
            document.getElementById('safetyList').innerHTML = '<div class="text-center text-muted py-3 bg-white rounded">加载失败，请稍后重试</div>';
            document.getElementById('noteList').innerHTML = '<div class="text-muted">加载失败，请稍后重试</div>';
        }

        function calcAverageScore(evaluations) {
            if (!evaluations || evaluations.length === 0) return 8.0;
            const total = evaluations.reduce((sum, item) => sum + Number(item.score || 0), 0);
            return Math.max(1, Math.min(10, total / evaluations.length));
        }

        function formatTime(value) {
            if (!value) return '--';
            const text = String(value);
            return text.length > 19 ? text.slice(0, 19) : text;
        }

        function isExpired(expireDate) {
            if (!expireDate) return false;
            const d = new Date(expireDate + 'T23:59:59');
            if (Number.isNaN(d.getTime())) return false;
            return d.getTime() < Date.now();
        }

        function showSharePreview(item) {
            document.getElementById('modalTitle').innerText = '用户分享';
            document.getElementById('modalDate').innerText = formatTime(item.create_time);
            document.getElementById('modalImg').src = item.image_url || 'https://via.placeholder.com/300x400?text=Share';
            const modal = document.getElementById('safetyModal');
            const statusLine = modal.querySelector('.text-start .mt-1');
            statusLine.className = 'mt-1 status-ok';
            statusLine.innerHTML = `<i class="bi bi-chat-square-text"></i> ${escapeHtml(item.content || '分享内容为空')}`;
            modal.style.display = 'flex';
        }

        // 交互逻辑
        function toggleStar() {
            const btn = document.getElementById('starBtn');
            if (btn.classList.contains('bi-star')) {
                btn.classList.replace('bi-star', 'bi-star-fill');
                btn.classList.add('star-active');
            } else {
                btn.classList.replace('bi-star-fill', 'bi-star');
                btn.classList.remove('star-active');
            }
        }

        function showModal(data) {
            document.getElementById('modalTitle').innerText = data.name;
            document.getElementById('modalDate').innerText = data.valid_end;
            document.getElementById('modalImg').src = data.img;
            const modal = document.getElementById('safetyModal');
            const statusLine = modal.querySelector('.text-start .mt-1');
            statusLine.className = data.expired ? 'mt-1 status-expired' : 'mt-1 status-ok';
            statusLine.innerHTML = data.expired
                ? '<i class="bi bi-x-circle-fill"></i> 状态过期'
                : '<i class="bi bi-check-circle-fill"></i> 状态正常';
            document.getElementById('safetyModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('safetyModal').style.display = 'none';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '');
        }

    </script>
    <script src="../../static/js/common.js"></script>
</body>
</html>
