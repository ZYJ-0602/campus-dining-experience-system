<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 校园食堂点评系统</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF7F24;
            --primary-hover: #ff9248;
            --step-inactive: #e9ecef;
            --step-text: #999;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card-custom {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: none;
            overflow: hidden;
        }

        .card-header-custom {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }

        .btn-back {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 20px;
            text-decoration: none;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .card-body-custom {
            padding: 30px 25px;
        }

        /* 步骤条样式 */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .step-item {
            position: relative;
            flex: 1;
            text-align: center;
        }

        .step-item:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 50%;
            width: 100%;
            height: 2px;
            background-color: var(--step-inactive);
            z-index: 0;
        }

        .step-circle {
            width: 30px;
            height: 30px;
            background-color: var(--step-inactive);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .step-label {
            font-size: 12px;
            color: var(--step-text);
            margin-top: 5px;
            transition: all 0.3s;
        }

        /* 激活状态 */
        .step-item.active .step-circle {
            background-color: var(--primary-color);
        }
        
        .step-item.active .step-label {
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .step-item.completed .step-circle {
            background-color: #28a745; /* 完成态绿色 */
        }
        
        .step-item.completed::after {
            background-color: #28a745;
        }

        /* 表单控件 */
        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            border-color: #eee;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 127, 36, 0.15);
        }

        .input-group-text {
            background: #fff;
            border-color: #eee;
            border-radius: 8px 0 0 8px;
            color: #999;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
        }

        /* 验证码按钮 */
        .btn-send-code {
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-send-code:hover {
            background-color: var(--primary-color);
            color: #fff;
        }

        /* 密码显示切换图标 */
        .password-toggle {
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        /* 成功提示动画 */
        .success-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 15px;
            animation: scaleUp 0.5s ease-out;
        }

        @keyframes scaleUp {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        /* 步骤切换动画容器 */
        .step-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        
        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <link href="../../static/css/common.css" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="card card-custom">
            <!-- 1. 顶部栏 -->
            <div class="card-header-custom">
                <a href="login.html" class="btn-back"><i class="bi bi-chevron-left"></i></a>
                <h1 class="header-title">找回密码</h1>
            </div>

            <div class="card-body-custom">
                <!-- 步骤指示器 -->
                <div class="step-indicator">
                    <div class="step-item active" id="step-indicator-1">
                        <div class="step-circle">1</div>
                        <div class="step-label">验证手机</div>
                    </div>
                    <div class="step-item" id="step-indicator-2">
                        <div class="step-circle">2</div>
                        <div class="step-label">重置密码</div>
                    </div>
                    <div class="step-item" id="step-indicator-3">
                        <div class="step-circle">3</div>
                        <div class="step-label">完成</div>
                    </div>
                </div>

                <!-- 步骤1：验证手机号 -->
                <div class="step-content active" id="step-1">
                    <form onsubmit="handleStep1(event)">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">手机号码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                <input type="tel" class="form-control" id="phone" placeholder="请输入注册手机号" required pattern="1[3-9]\d{9}">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-secondary">验证码</label>
                            <div class="row g-2">
                                <div class="col-7">
                                    <input type="text" class="form-control" id="smsCode" placeholder="6位验证码" required maxlength="6">
                                </div>
                                <div class="col-5">
                                    <button type="button" class="btn btn-outline-primary w-100 btn-send-code" id="btnSendCode" onclick="sendSmsCode()">获取验证码</button>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-primary-custom">下一步</button>
                    </form>
                </div>

                <!-- 步骤2：设置新密码 -->
                <div class="step-content" id="step-2">
                    <form onsubmit="handleStep2(event)">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">新密码</label>
                            <div class="input-group position-relative">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="newPassword" placeholder="6-16位字母+数字" required minlength="6" maxlength="16">
                                <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle" onclick="togglePassword('newPassword', this)">
                                    <i class="bi bi-eye-slash"></i>
                                </span>
                            </div>
                            <div class="form-text text-muted small mt-1">密码需包含字母和数字，长度6-16位</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-secondary">确认新密码</label>
                            <div class="input-group position-relative">
                                <span class="input-group-text"><i class="bi bi-check-lg"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入新密码" required>
                                <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle" onclick="togglePassword('confirmPassword', this)">
                                    <i class="bi bi-eye-slash"></i>
                                </span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-primary-custom">确认重置</button>
                    </form>
                </div>

                <!-- 步骤3：重置成功 -->
                <div class="step-content" id="step-3">
                    <div class="text-center py-4">
                        <i class="bi bi-check-circle-fill success-icon"></i>
                        <h4 class="mb-2">密码重置成功！</h4>
                        <p class="text-secondary small mb-4">您现在可以使用新密码登录系统了</p>
                        <a href="login.html" class="btn btn-primary btn-primary-custom">返回登录页</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let currentStep = 1;
        let resetToken = ''; // 模拟后端返回的token
        let countdown = 0;
        let timer = null;

        // 密码显示/隐藏切换
        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            const icon = iconEl.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            }
        }

        // 发送验证码
        function sendSmsCode() {
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value;
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号码！');
                phoneInput.focus();
                return;
            }

            if (countdown > 0) return;

            // 模拟API请求
            const btn = document.getElementById('btnSendCode');
            btn.disabled = true;
            btn.textContent = '发送中...';

            setTimeout(() => {
                alert(`验证码已发送至 ${phone}，请注意查收（测试码：6666）`);
                
                // 开始倒计时
                countdown = 60;
                btn.textContent = `${countdown}s后重发`;
                
                timer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    } else {
                        btn.textContent = `${countdown}s后重发`;
                    }
                }, 1000);
            }, 1000);
        }

        // 处理步骤1：验证手机
        function handleStep1(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('smsCode').value;

            if (code !== '6666') {
                alert('验证码错误！(测试请使用 6666)');
                return;
            }

            // 模拟验证通过
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 验证中...';
            btn.disabled = true;

            setTimeout(() => {
                resetToken = 'mock_token_123456'; // 模拟获取token
                btn.innerHTML = originalText;
                btn.disabled = false;
                nextStep(2);
            }, 800);
        }

        // 处理步骤2：重置密码
        function handleStep2(e) {
            e.preventDefault();
            const pwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            // 简单校验
            if (pwd.length < 6) {
                alert('密码长度至少6位！');
                return;
            }
            if (!/[A-Za-z]/.test(pwd) || !/[0-9]/.test(pwd)) {
                alert('密码需包含字母和数字！');
                return;
            }
            if (pwd !== confirmPwd) {
                alert('两次输入的密码不一致！');
                return;
            }

            // 模拟提交
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 提交中...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                nextStep(3);
            }, 1000);
        }

        // 步骤切换逻辑
        function nextStep(step) {
            // 隐藏当前步骤内容
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            
            // 更新指示器状态（完成态）
            const prevIndicator = document.getElementById(`step-indicator-${currentStep}`);
            prevIndicator.classList.remove('active');
            prevIndicator.classList.add('completed');
            prevIndicator.querySelector('.step-circle').innerHTML = '<i class="bi bi-check"></i>';

            // 显示下一步内容
            currentStep = step;
            document.getElementById(`step-${currentStep}`).classList.add('active');
            
            // 更新指示器状态（激活态）
            const currIndicator = document.getElementById(`step-indicator-${currentStep}`);
            currIndicator.classList.add('active');
        }
    </script>
    <script src="../../static/js/common.js"></script>
    <script src="../../static/js/mock_data.js"></script>
</body>
</html>
