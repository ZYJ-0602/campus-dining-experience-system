<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单 - 食堂点评管理后台</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand: #ff7f24;
            --brand-soft: #fff2e6;
            --ink: #2e2e2e;
            --line: #ececec;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #fff8f2 0%, #f6f7fa 100%);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
        }

        .wrap {
            max-width: 760px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .panel {
            background: #fff;
            border: 1px solid #f0ebe5;
            border-radius: 16px;
            box-shadow: 0 10px 26px rgba(20, 20, 20, 0.06);
        }

        .panel-head {
            padding: 18px 22px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-body {
            padding: 22px;
        }

        .section-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #a35b18;
            background: var(--brand-soft);
            border: 1px solid #ffd7b8;
            border-radius: 999px;
            padding: 4px 10px;
            margin-bottom: 12px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            min-height: 44px;
            border-color: #ddd;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.2rem rgba(255, 127, 36, 0.18);
        }

        .btn-brand {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
            min-width: 120px;
        }

        .btn-brand:hover {
            background: #e66e13;
            border-color: #e66e13;
            color: #fff;
        }

        .foot {
            padding: 16px 22px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="panel">
        <div class="panel-head">
            <h5 class="mb-0" id="pageTitle">新增用户</h5>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.close()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="panel-body">
            <div class="section-tag"><i class="bi bi-person-badge"></i> 独立用户表单</div>
            <form id="userForm" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">用户名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="username" required>
                        <div class="form-text">2-20 位，唯一。</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-control" id="nickname" placeholder="可选">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="phone" pattern="[0-9]{11}" placeholder="11位手机号，可选">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">角色 <span class="text-danger">*</span></label>
                        <select class="form-select" id="role" required>
                            <option value="student">普通用户</option>
                            <option value="operator">食堂运营</option>
                            <option value="admin">管理员</option>
                            <option value="teacher">教师</option>
                        </select>
                    </div>
                    <div class="col-12" id="passwordGroup">
                        <label class="form-label">密码 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="password" value="123456" required>
                        <div class="form-text">新增时默认 123456，编辑时留空表示不修改密码。</div>
                    </div>
                </div>
            </form>
        </div>
        <div class="foot">
            <button class="btn btn-light" onclick="window.close()">取消</button>
            <button class="btn btn-brand" id="saveBtn" onclick="submitForm()">保存</button>
        </div>
    </div>
</div>

<script src="../../static/js/bootstrap.bundle.min.js"></script>
<script src="../c-client/js/api.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') === 'edit' ? 'edit' : 'add';
    const userId = Number(params.get('id') || 0);
    const API_USER_LIST = `${API_BASE_URL}/admin/users`;

    document.addEventListener('DOMContentLoaded', async function() {
        document.getElementById('pageTitle').textContent = mode === 'edit' ? '编辑用户' : '新增用户';
        if (mode === 'edit') {
            document.getElementById('password').value = '';
            document.getElementById('password').placeholder = '留空表示不修改密码';
            await loadUserDetail();
        }
    });

    async function loadUserDetail() {
        if (!userId) {
            alert('缺少用户ID');
            return;
        }
        const res = await fetchApi(`${API_USER_LIST}/${userId}`);
        if (res.code !== 200) {
            alert(res.msg || '加载用户失败');
            return;
        }
        const data = res.data || {};
        document.getElementById('username').value = data.username || '';
        document.getElementById('nickname').value = data.nickname || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('role').value = data.role || 'student';
    }

    async function submitForm() {
        const form = document.getElementById('userForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        const oldText = btn.textContent;
        btn.textContent = '保存中...';

        const payload = {
            username: document.getElementById('username').value.trim(),
            nickname: document.getElementById('nickname').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            role: document.getElementById('role').value
        };

        const pwd = document.getElementById('password').value.trim();
        if (mode === 'add' || pwd) {
            payload.password = pwd || '123456';
        }

        let res;
        if (mode === 'add') {
            res = await fetchApi(API_USER_LIST, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
        } else {
            res = await fetchApi(`${API_USER_LIST}/${userId}`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });
        }

        btn.disabled = false;
        btn.textContent = oldText;

        if (res.code === 200) {
            alert(mode === 'add' ? '新增成功' : '更新成功');
            if (window.opener) {
                window.opener.postMessage({ type: 'admin-user-changed' }, '*');
            }
            window.close();
            return;
        }
        alert(res.msg || '保存失败');
    }
</script>
</body>
</html>
