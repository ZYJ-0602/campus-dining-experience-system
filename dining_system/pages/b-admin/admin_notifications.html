<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 食堂点评管理后台</title>
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1677ff;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --border: #e5e6eb;
            --text: #606266;
            --text-dark: #1f2329;
            --danger: #ff4d4f;
            --success: #52c41a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Microsoft YaHei", "PingFang SC", sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        .page-wrap {
            padding: 24px;
            min-height: 100vh;
        }

        .toolbar-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1.2fr 2fr auto;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box .bi-search {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0a5b0;
        }

        .search-input,
        .filter-select {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            outline: none;
            background: #fff;
        }

        .search-input {
            padding: 0 12px 0 36px;
        }

        .filter-select {
            padding: 0 12px;
        }

        .search-input:focus,
        .filter-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
        }

        .filter-group {
            display: grid;
            grid-template-columns: 140px 160px 140px;
            gap: 10px;
            align-items: center;
        }

        .toolbar-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary-blue,
        .btn-outline-gray,
        .btn-outline-danger {
            border-radius: 8px;
            padding: 8px 16px;
            border: 1px solid transparent;
            background: #fff;
            line-height: 1;
            cursor: pointer;
        }

        .btn-primary-blue {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-primary-blue:hover {
            background: #0958d9;
            border-color: #0958d9;
        }

        .btn-outline-gray {
            border-color: #dcdfe6;
            color: #4e5969;
        }

        .btn-outline-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .summary-bar {
            margin-top: 16px;
            background: #f7f8fa;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            background: var(--success);
        }

        .table-card {
            margin-top: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-responsive-wrap {
            overflow-x: auto;
        }

        .msg-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
        }

        .msg-table th,
        .msg-table td {
            padding: 12px 16px;
            white-space: nowrap;
            vertical-align: middle;
        }

        .msg-table thead th {
            background: #f7f8fa;
            font-weight: 700;
            color: #303133;
            border-bottom: 1px solid var(--border);
        }

        .msg-table tbody td {
            border-bottom: 1px solid #f0f1f5;
            color: #4e5969;
        }

        .msg-table tbody tr:hover td {
            background: #fafafa;
        }

        .status-tag {
            display: inline-block;
            min-width: 58px;
            text-align: center;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .status-read {
            background: #f0f1f5;
            color: #86909c;
        }

        .status-unread {
            background: #e8f3ff;
            color: var(--primary);
        }

        .content-cell {
            max-width: 360px;
            white-space: normal;
            line-height: 1.4;
        }

        .action-link {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .pagination-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: #fff;
        }

        .empty-row {
            text-align: center;
            color: #909399;
            padding: 28px 0;
        }

        .toast-box {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 2000;
            min-width: 240px;
        }

        @media (max-width: 1200px) {
            .toolbar-card {
                grid-template-columns: 1fr;
            }

            .filter-group {
                grid-template-columns: repeat(3, minmax(120px, 1fr));
            }

            .toolbar-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="toolbar-card">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input id="keywordInput" class="search-input" placeholder="搜索标题/内容/用户名">
        </div>
        <div class="filter-group">
            <select id="roleFilter" class="filter-select">
                <option value="">全部角色</option>
                <option value="admin">管理员</option>
                <option value="operator">食堂运营</option>
                <option value="student">普通用户</option>
                <option value="teacher">教师</option>
            </select>
            <select id="eventTypeFilter" class="filter-select">
                <option value="">全部事件</option>
                <option value="bad_review">差评预警</option>
                <option value="pending_audit">待审核提醒</option>
            </select>
            <select id="isReadFilter" class="filter-select">
                <option value="">全部状态</option>
                <option value="0">未读</option>
                <option value="1">已读</option>
            </select>
        </div>
        <div class="toolbar-actions">
            <button class="btn-outline-gray" onclick="resetFilters()">重置</button>
            <button class="btn-primary-blue" onclick="loadMessages(1)">查询</button>
            <button class="btn-outline-danger" onclick="markAllRead()">全部已读</button>
        </div>
    </div>

    <div class="summary-bar">
        <div><span class="dot"></span>未读消息 <strong id="unreadCount">0</strong> 条</div>
        <div class="text-muted">仅展示站内通知下发记录</div>
    </div>

    <div class="table-card">
        <div class="table-responsive-wrap">
            <table class="msg-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>时间</th>
                    <th>接收人</th>
                    <th>角色</th>
                    <th>事件</th>
                    <th>标题</th>
                    <th>内容</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="pagination-bar">
            <span class="text-muted" id="pageInfo">第 1 / 1 页</span>
            <button id="prevBtn" class="btn-outline-gray" onclick="changePage(-1)">上一页</button>
            <button id="nextBtn" class="btn-outline-gray" onclick="changePage(1)">下一页</button>
        </div>
    </div>
</div>

<div class="toast-box" id="toastBox"></div>

<script src="../../static/js/bootstrap.bundle.min.js"></script>
<script src="../c-client/js/api.js"></script>
<script>
    const API_MSG = `${API_BASE_URL}/admin/notifications`;
    const API_MSG_READ_ALL = `${API_BASE_URL}/admin/notifications/read_all`;
    let currentPage = 1;
    let totalPages = 1;
    const pageSize = 20;

    function showToast(message, type = 'success') {
        const holder = document.getElementById('toastBox');
        const node = document.createElement('div');
        node.className = `alert ${type === 'error' ? 'alert-danger' : 'alert-success'} shadow-sm`;
        node.textContent = message;
        holder.appendChild(node);
        setTimeout(() => node.remove(), 2200);
    }

    function eventText(eventType) {
        if (eventType === 'bad_review') return '差评预警';
        if (eventType === 'pending_audit') return '待审核提醒';
        return eventType || '-';
    }

    function roleText(role) {
        if (role === 'admin') return '管理员';
        if (role === 'operator') return '食堂运营';
        if (role === 'student') return '普通用户';
        if (role === 'teacher') return '教师';
        return role || '-';
    }

    function renderRows(list) {
        const tbody = document.getElementById('tableBody');
        if (!Array.isArray(list) || list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" class="empty-row">暂无消息记录</td></tr>`;
            return;
        }

        tbody.innerHTML = list.map(item => {
            const who = (item.nickname || item.username || '-') + ` (${item.user_id})`;
            const statusClass = item.is_read ? 'status-read' : 'status-unread';
            const statusText = item.is_read ? '已读' : '未读';
            const markBtn = item.is_read ? '-' : `<a class="action-link" onclick="markRead(${item.id})">标记已读</a>`;
            return `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.create_time || '-'}</td>
                    <td>${who}</td>
                    <td>${roleText(item.role)}</td>
                    <td>${eventText(item.event_type)}</td>
                    <td>${item.title || '-'}</td>
                    <td class="content-cell">${item.content || '-'}</td>
                    <td><span class="status-tag ${statusClass}">${statusText}</span></td>
                    <td>${markBtn}</td>
                </tr>
            `;
        }).join('');
    }

    function queryParams(page) {
        const params = new URLSearchParams();
        params.set('page', String(page));
        params.set('limit', String(pageSize));

        const keyword = (document.getElementById('keywordInput').value || '').trim();
        const role = document.getElementById('roleFilter').value;
        const eventType = document.getElementById('eventTypeFilter').value;
        const isRead = document.getElementById('isReadFilter').value;

        if (keyword) params.set('keyword', keyword);
        if (role) params.set('role', role);
        if (eventType) params.set('event_type', eventType);
        if (isRead !== '') params.set('is_read', isRead);
        return params.toString();
    }

    async function loadMessages(page = 1) {
        const res = await fetchApi(`${API_MSG}?${queryParams(page)}`, { method: 'GET' });
        if (res.code !== 200) {
            showToast(res.msg || '加载消息失败', 'error');
            return;
        }

        const data = res.data || {};
        currentPage = Number(data.page || 1);
        totalPages = Number(data.pages || 1);
        document.getElementById('unreadCount').textContent = String(data.unread_count || 0);
        document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages || 1} 页`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        renderRows(data.list || []);
    }

    async function markRead(id) {
        const res = await fetchApi(`${API_MSG}/${id}/read`, { method: 'POST' });
        if (res.code !== 200) {
            showToast(res.msg || '操作失败', 'error');
            return;
        }
        showToast('已标记为已读');
        await loadMessages(currentPage);
    }

    async function markAllRead() {
        const role = document.getElementById('roleFilter').value;
        const res = await fetchApi(API_MSG_READ_ALL, {
            method: 'POST',
            body: JSON.stringify(role ? { role } : {})
        });
        if (res.code !== 200) {
            showToast(res.msg || '操作失败', 'error');
            return;
        }
        showToast(`处理完成，更新 ${res.data?.updated || 0} 条`);
        await loadMessages(currentPage);
    }

    function resetFilters() {
        document.getElementById('keywordInput').value = '';
        document.getElementById('roleFilter').value = '';
        document.getElementById('eventTypeFilter').value = '';
        document.getElementById('isReadFilter').value = '';
        loadMessages(1);
    }

    function changePage(step) {
        const target = currentPage + step;
        if (target < 1 || target > totalPages) return;
        loadMessages(target);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadMessages(1);
        document.getElementById('keywordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadMessages(1);
        });
    });
</script>
</body>
</html>
