<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哎呀，出错了 - 校园食堂点评系统</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF7F24;
            --primary-hover: #ff9248;
            --text-color: #666;
            --bg-color: #f8f9fa;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部模拟错误切换条 (仅演示用) */
        .debug-bar {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .debug-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin: 0 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .debug-btn:hover, .debug-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* 主内容区域 */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            text-align: center;
        }

        .error-illustration {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .error-desc {
            font-size: 16px;
            color: var(--text-color);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        /* 按钮组 */
        .btn-group-custom {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-custom {
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-outline-custom {
            border-color: #ddd;
            color: #666;
            background: #fff;
        }

        .btn-outline-custom:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: #fff;
        }

        /* 客服弹窗 */
        .qrcode-container {
            text-align: center;
            padding: 20px;
        }
        
        .qrcode-img {
            width: 200px;
            height: 200px;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 8px;
        }

        /* 响应式调整 */
        @media (max-width: 576px) {
            .error-illustration {
                max-width: 280px;
            }
            .error-title {
                font-size: 24px;
            }
            .btn-custom {
                width: 100%;
                justify-content: center;
            }
            .btn-group-custom {
                width: 100%;
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
    <link href="../../static/css/common.css" rel="stylesheet">
</head>
<body>

    <!-- 1. 顶部模拟错误切换条 (仅用于演示效果) -->
    <div class="debug-bar">
        <span class="me-2">模拟场景切换：</span>
        <button class="debug-btn active" onclick="switchErrorType('404')">404 页面不存在</button>
        <button class="debug-btn" onclick="switchErrorType('500')">500 服务器错误</button>
        <button class="debug-btn" onclick="switchErrorType('network')">网络连接失败</button>
    </div>

    <!-- 2. 错误展示模块 -->
    <div class="error-container">
        <!-- 插图 (使用SVG模拟不同场景) -->
        <div id="illustration-area">
            <!-- 默认显示404 -->
            <img src="https://via.placeholder.com/400x300/f8f9fa/FF7F24?text=404+Page+Not+Found" class="error-illustration" alt="404 Error">
        </div>

        <h1 class="error-title" id="error-title">哎呀，页面走丢了～</h1>
        <p class="error-desc" id="error-desc">您访问的页面可能已被删除、更名或暂时不可用。<br>请检查您输入的网址是否正确。</p>

        <!-- 3. 操作按钮 -->
        <div class="btn-group-custom" id="action-buttons">
            <a href="index.html" class="btn btn-custom btn-primary-custom">
                <i class="bi bi-house-door-fill"></i> 返回首页
            </a>
            <button class="btn btn-custom btn-outline-custom" onclick="openServiceModal()">
                <i class="bi bi-headset"></i> 联系客服
            </button>
            <!-- 刷新按钮 (动态显示) -->
            <button class="btn btn-custom btn-outline-custom" id="refresh-btn" onclick="refreshPage()" style="display: none;">
                <i class="bi bi-arrow-clockwise"></i> 刷新页面
            </button>
        </div>
    </div>

    <!-- 客服弹窗 -->
    <div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">联系客服</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="qrcode-container">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Service" class="qrcode-img" alt="客服二维码">
                        <p class="mt-3 text-muted">请使用微信扫一扫<br>联系在线客服反馈问题</p>
                        <p class="small text-secondary">工作时间：9:00 - 21:00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../../static/js/bootstrap.bundle.min.js"></script>
    <script>
        // 错误类型配置
        const errorConfig = {
            '404': {
                img: 'https://via.placeholder.com/400x300/f8f9fa/FF7F24?text=404+Page+Not+Found', // 实际开发可替换为SVG插画
                title: '哎呀，页面走丢了～',
                desc: '您访问的页面可能已被删除、更名或暂时不可用。<br>请检查您输入的网址是否正确。',
                showRefresh: false
            },
            '500': {
                img: 'https://via.placeholder.com/400x300/f8f9fa/dc3545?text=500+Server+Error',
                title: '服务器开小差了～',
                desc: '服务器遇到了一点小问题，正在紧急抢修中。<br>请稍后再试或联系管理员。',
                showRefresh: true
            },
            'network': {
                img: 'https://via.placeholder.com/400x300/f8f9fa/6c757d?text=Network+Error',
                title: '网络离家出走了～',
                desc: '您的网络连接似乎断开了，请检查网络设置。<br>连接恢复后请刷新重试。',
                showRefresh: true
            }
        };

        // 切换错误类型
        function switchErrorType(type) {
            const config = errorConfig[type];
            if (!config) return;

            // 更新顶部按钮状态
            document.querySelectorAll('.debug-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 更新内容 (带简单淡入动画)
            const container = document.querySelector('.error-container');
            container.style.opacity = '0.5';
            
            setTimeout(() => {
                // 更新图片
                document.querySelector('.error-illustration').src = config.img;
                
                // 更新文本
                document.getElementById('error-title').textContent = config.title;
                document.getElementById('error-desc').innerHTML = config.desc;
                
                // 更新按钮显示
                const refreshBtn = document.getElementById('refresh-btn');
                refreshBtn.style.display = config.showRefresh ? 'inline-flex' : 'none';
                
                container.style.opacity = '1';
                container.style.transition = 'opacity 0.3s ease';
            }, 200);
        }

        // 刷新页面
        function refreshPage() {
            const btn = document.getElementById('refresh-btn');
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 加载中...';
            btn.disabled = true;

            // 模拟刷新延迟
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

        // 打开客服弹窗
        function openServiceModal() {
            const modal = new bootstrap.Modal(document.getElementById('serviceModal'));
            modal.show();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 默认显示404状态
            // 实际项目中可根据URL参数或后端返回状态码自动切换
        });
    </script>
    <script src="../../static/js/common.js"></script>
    <script src="../../static/js/mock_data.js"></script>
</body>
</html>
