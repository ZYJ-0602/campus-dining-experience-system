<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 食堂点评管理后台</title>
    <!-- 引入 Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --primary-light: #f0f8ff;
            --text-dark: #333;
            --bg-color: #f8f9fa;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .navbar-custom {
            background-color: #343a40;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-title {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            border-left: 1px solid rgba(255,255,255,0.3);
            padding-left: 15px;
            margin-left: 15px;
        }

        /* 主内容布局 */
        .main-container {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .settings-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .card-header-custom {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            color: #333;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body-custom {
            padding: 20px;
        }

        /* 表单样式 */
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-text {
            font-size: 12px;
            color: #999;
        }

        /* 开关样式 */
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* 备份记录列表 */
        .backup-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .backup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .backup-item:last-child {
            border-bottom: none;
        }

        .backup-info {
            display: flex;
            flex-direction: column;
        }

        .backup-time {
            font-weight: 500;
            color: #333;
        }

        .backup-size {
            font-size: 12px;
            color: #999;
        }

        /* 通知多选框组 */
        .checkbox-group {
            display: flex;
            gap: 15px;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <!-- 1. 顶部导航栏 -->
    <div class="navbar-custom">
        <div class="d-flex align-items-center">
            <a href="admin_index.html" class="navbar-brand">
                <i class="bi bi-gear-fill"></i>
                食堂点评管理后台
            </a>
            <span class="navbar-title">系统设置</span>
        </div>
        <div>
            <a href="admin_index.html" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-arrow-left"></i> 返回首页
            </a>
            <button id="saveBtn" class="btn btn-primary btn-sm" onclick="saveSettings()" disabled>
                <i class="bi bi-save"></i> 保存设置
            </button>
        </div>
    </div>

    <div class="main-container">
        <form id="settingsForm" onchange="enableSave()">
            <div class="row">
                <!-- 左列：基础配置 -->
                <div class="col-md-6">
                    <!-- 2. 基础配置模块 -->
                    <div class="settings-card">
                        <div class="card-header-custom">
                            <i class="bi bi-sliders text-primary"></i> 基础参数配置
                        </div>
                        <div class="card-body-custom">
                            <h6 class="border-bottom pb-2 mb-3 text-secondary">评价相关</h6>
                            <div class="mb-3">
                                <label class="form-label">防重复提交时间 (分钟)</label>
                                <input type="number" class="form-control" name="repeatTime" value="5" min="1" max="60">
                                <div class="form-text">同一用户对此时间内的同一窗口评价将被拦截</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">评分范围 (1-10分)</label>
                                <div class="input-group">
                                    <span class="input-group-text">最低</span>
                                    <input type="number" class="form-control" name="scoreMin" value="1" readonly>
                                    <span class="input-group-text">最高</span>
                                    <input type="number" class="form-control" name="scoreMax" value="10" readonly>
                                </div>
                            </div>

                            <h6 class="border-bottom pb-2 mb-3 mt-4 text-secondary">内容发布</h6>
                            <div class="mb-3 d-flex justify-content-between align-items-center">
                                <div>
                                    <label class="form-label mb-0">开启内容审核</label>
                                    <div class="form-text mt-0">开启后，笔记需管理员审核通过才可显示</div>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="auditEnabled" checked>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">单次图片上传上限 (张)</label>
                                <input type="number" class="form-control" name="imgLimit" value="9" min="1" max="20">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">单文件大小限制 (MB)</label>
                                <input type="number" class="form-control" name="fileSize" value="10" min="1" max="50">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">允许上传格式</label>
                                <div class="checkbox-group">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" checked disabled>
                                        <label class="form-check-label">JPG/JPEG</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" checked disabled>
                                        <label class="form-check-label">PNG</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="allowPDF">
                                        <label class="form-check-label">PDF (仅限食安公示)</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右列：数据维护与通知 -->
                <div class="col-md-6">
                    <!-- 3. 数据维护模块 -->
                    <div class="settings-card">
                        <div class="card-header-custom">
                            <i class="bi bi-database text-success"></i> 数据维护
                        </div>
                        <div class="card-body-custom">
                            <div class="d-flex gap-3 mb-4">
                                <button type="button" class="btn btn-outline-success flex-grow-1" id="backupBtn" onclick="backupData()">
                                    <i class="bi bi-cloud-arrow-down"></i> 立即备份数据库
                                </button>
                                <button type="button" class="btn btn-outline-warning flex-grow-1" onclick="repairData()">
                                    <i class="bi bi-tools"></i> 检测并修复数据
                                </button>
                            </div>
                            <h6 class="text-secondary small mb-2">最近备份记录</h6>
                            <ul class="backup-list border rounded" id="backupList">
                                <!-- 备份记录动态生成 -->
                                <li class="backup-item">
                                    <div class="backup-info">
                                        <span class="backup-time">2024-05-01 12:00:00</span>
                                        <span class="backup-size">2.5MB (自动备份)</span>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-link text-decoration-none" onclick="downloadBackup('20240501.sql')">下载</button>
                                </li>
                                <li class="backup-item">
                                    <div class="backup-info">
                                        <span class="backup-time">2024-04-30 12:00:00</span>
                                        <span class="backup-size">2.4MB (自动备份)</span>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-link text-decoration-none" onclick="downloadBackup('20240430.sql')">下载</button>
                                </li>
                                <li class="backup-item">
                                    <div class="backup-info">
                                        <span class="backup-time">2024-04-29 12:00:00</span>
                                        <span class="backup-size">2.3MB (自动备份)</span>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-link text-decoration-none" onclick="downloadBackup('20240429.sql')">下载</button>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- 4. 通知设置模块 -->
                    <div class="settings-card">
                        <div class="card-header-custom">
                            <i class="bi bi-bell text-warning"></i> 通知规则设置
                        </div>
                        <div class="card-body-custom">
                            <div class="mb-3">
                                <label class="form-label">差评提醒 (通知食堂运营)</label>
                                <div class="checkbox-group">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="notifyBadReview" value="site" checked>
                                        <label class="form-check-label">站内信</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="notifyBadReview" value="email">
                                        <label class="form-check-label">邮件通知</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="notifyBadReview" value="sms" disabled>
                                        <label class="form-check-label text-muted">短信 (需配置网关)</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">待审核提醒 (通知管理员)</label>
                                <div class="checkbox-group">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="notifyAudit" value="site" checked>
                                        <label class="form-check-label">站内信</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="notifyAudit" value="email" checked>
                                        <label class="form-check-label">邮件通知</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">通知频率限制</label>
                                <select class="form-select" name="notifyFreq">
                                    <option value="realtime">实时发送</option>
                                    <option value="hourly">每小时汇总</option>
                                    <option value="daily">每天汇总</option>
                                </select>
                            </div>
                            <div class="mt-3 pt-3 border-top">
                                <label class="form-label">邮件服务测试</label>
                                <div class="input-group">
                                    <input type="email" class="form-control" id="testEmail" placeholder="输入接收测试邮件的邮箱">
                                    <button class="btn btn-outline-secondary" type="button" onclick="sendTestEmail()">发送测试</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面状态标记
        let isModified = false;

        function enableSave() {
            if (!isModified) {
                isModified = true;
                const btn = document.getElementById('saveBtn');
                btn.disabled = false;
                btn.classList.remove('btn-secondary');
                btn.classList.add('btn-primary');
            }
        }

        // 保存配置
        function saveSettings() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            
            // 模拟保存过程
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 保存中...';
            btn.disabled = true;

            setTimeout(() => {
                // 获取表单数据 (模拟)
                // const formData = new FormData(document.getElementById('settingsForm'));
                
                alert("系统配置已保存生效！");
                
                btn.innerHTML = originalText;
                // 恢复禁用状态
                btn.disabled = true;
                isModified = false;
            }, 800);
        }

        // 数据库备份
        function backupData() {
            const btn = document.getElementById('backupBtn');
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 备份中...';
            btn.disabled = true;

            setTimeout(() => {
                // 模拟备份成功
                const now = new Date();
                const timeStr = now.toLocaleString().replace(/\//g, "-");
                const fileName = `backup_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.sql`;
                
                // 添加新记录到列表
                const list = document.getElementById('backupList');
                const newItem = document.createElement('li');
                newItem.className = 'backup-item';
                newItem.innerHTML = `
                    <div class="backup-info">
                        <span class="backup-time">${timeStr}</span>
                        <span class="backup-size">2.6MB (手动备份)</span>
                    </div>
                    <button type="button" class="btn btn-sm btn-link text-decoration-none" onclick="downloadBackup('${fileName}')">下载</button>
                `;
                
                // 插入到最前
                list.insertBefore(newItem, list.firstChild);
                // 移除最后一条，保持显示最近3条
                if (list.children.length > 3) {
                    list.removeChild(list.lastChild);
                }

                alert("数据库备份成功！");
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }, 1500);
        }

        // 数据修复
        function repairData() {
            const btn = event.target;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 检测中...';
            btn.disabled = true;

            setTimeout(() => {
                alert("数据检测完成：未发现异常数据。");
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }, 1000);
        }

        // 下载备份
        function downloadBackup(fileName) {
            alert(`正在下载备份文件：${fileName}`);
        }

        // 发送测试邮件
        function sendTestEmail() {
            const email = document.getElementById('testEmail').value;
            if (!email) {
                alert("请输入接收测试邮件的邮箱地址！");
                return;
            }
            if (!email.includes('@')) {
                alert("请输入有效的邮箱地址！");
                return;
            }

            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = "发送中...";
            btn.disabled = true;

            setTimeout(() => {
                alert(`测试邮件已发送至 ${email}，请查收。`);
                btn.textContent = originalText;
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
