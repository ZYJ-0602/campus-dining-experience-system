<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 校园食堂点评系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9933;
            --primary-hover: #f08f2d;
            --bg-gradient: linear-gradient(135deg, #ff9933 0%, #ffb366 100%);
            --golden-input-width: 61.8%;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .auth-container {
            width: 400px;
            max-width: 400px;
            padding: 0;
        }

        .card-custom {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
        }

        .card-header-custom {
            background: var(--bg-gradient);
            padding: 30px 20px;
            text-align: center;
            color: #fff;
        }

        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .system-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .card-body-custom {
            padding: 28px;
        }

        #registerForm {
            width: 100%;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .golden-row {
            width: var(--golden-input-width);
            margin-left: auto;
            margin-right: auto;
        }

        .form-row:last-of-type {
            margin-bottom: 0;
        }

        .field-wrap {
            position: relative;
            width: 100%;
        }

        .form-control {
            border-radius: 4px;
            width: 100%;
            min-height: 40px;
            padding: 10px 10px 10px 44px;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .form-control.with-toggle {
            padding-right: 34px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 153, 51, 0.12);
        }

        .field-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b8b8b8;
            width: 20px;
            height: 20px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
            background: transparent;
        }

        .btn-send-code {
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
            min-height: 40px;
        }

        .sms-code-row {
            display: flex;
            align-items: stretch;
            gap: 12px;
        }

        .sms-code-input-col {
            flex: 0 0 calc((100% - 12px) * 0.63);
            max-width: calc((100% - 12px) * 0.63);
        }

        .sms-code-btn-col {
            flex: 0 0 calc((100% - 12px) * 0.37);
            max-width: calc((100% - 12px) * 0.37);
        }

        .sms-code-row .form-control,
        .sms-code-row .btn-send-code {
            min-height: 40px;
            height: 40px;
            border-radius: 4px;
        }

        .sms-code-row .btn-send-code {
            padding-left: 5px;
        }

        .sms-code-row .form-control {
            min-width: 0;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 4px;
            min-height: 40px;
            padding: 9px 12px;
            font-size: 15px;
            font-weight: 600;
            width: var(--golden-input-width);
            display: block;
            margin: 0 auto;
            transition: all 0.2s;
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary-custom:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link-primary-custom {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .link-primary-custom:hover {
            text-decoration: underline;
        }

        .password-toggle {
            border: none;
            background: transparent;
            cursor: pointer;
            color: #b8b8b8;
            z-index: 10;
            font-size: 14px;
            line-height: 1;
            padding: 0;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        @media (max-width: 576px) {
            .auth-container {
                width: calc(100vw - 24px);
                max-width: 400px;
            }

            :root {
                --golden-input-width: 74%;
            }

            .card-body-custom {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card card-custom">
            <div class="card-header-custom">
                <i class="bi bi-shop logo-icon"></i>
                <h1 class="system-title">校园食堂点评系统</h1>
            </div>

            <div class="card-body-custom">
                <form id="registerForm">
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="regUsername" placeholder="设置用户名 (2-10位)" required minlength="2" maxlength="10">
                        </div>
                    </div>
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-phone"></i></span>
                            <input type="tel" class="form-control" id="regPhone" placeholder="手机号码" required pattern="1[3-9]\d{9}">
                        </div>
                    </div>
                    <div class="form-row golden-row sms-code-row">
                        <div class="sms-code-input-col">
                            <div class="field-wrap">
                                <span class="field-icon" aria-hidden="true"><i class="bi bi-shield-lock"></i></span>
                                <input type="text" class="form-control" id="regSmsCode" placeholder="短信验证码" required maxlength="6">
                            </div>
                        </div>
                        <div class="sms-code-btn-col">
                            <button type="button" class="btn btn-outline-secondary w-100 btn-send-code" id="btnSendCode">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control with-toggle" id="regPassword" placeholder="设置密码 (6-16位)" required minlength="6" maxlength="16">
                            <button type="button" class="position-absolute top-50 end-0 translate-middle-y me-2 password-toggle" id="pwdToggle1" aria-label="切换密码可见性"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control with-toggle" id="regConfirmPassword" placeholder="确认密码" required>
                            <button type="button" class="position-absolute top-50 end-0 translate-middle-y me-2 password-toggle" id="pwdToggle2" aria-label="切换密码可见性"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary-custom" id="registerBtn">注 册</button>
                </form>

                <div class="auth-footer">
                    <span class="text-secondary">已有账号？</span>
                    <a href="/login" class="link-primary-custom">立即登录</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        let countdown = 0;
        let timer = null;

        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            const icon = iconEl.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        document.getElementById('pwdToggle1').addEventListener('click', function() {
            togglePassword('regPassword', this);
        });
        document.getElementById('pwdToggle2').addEventListener('click', function() {
            togglePassword('regConfirmPassword', this);
        });

        document.getElementById('btnSendCode').addEventListener('click', function() {
            const phoneInput = document.getElementById('regPhone');
            const phone = phoneInput.value;
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号码！');
                phoneInput.focus();
                return;
            }
            if (countdown > 0) return;

            const btn = this;
            btn.disabled = true;
            btn.textContent = '发送中...';
            setTimeout(() => {
                alert(`验证码已发送至 ${phone}，测试码：123456`);
                countdown = 60;
                btn.textContent = `${countdown}s后重发`;
                timer = setInterval(() => {
                    countdown -= 1;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    } else {
                        btn.textContent = `${countdown}s后重发`;
                    }
                }, 1000);
            }, 800);
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('regUsername').value.trim();
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPwd = document.getElementById('regConfirmPassword').value;
            const smsCode = document.getElementById('regSmsCode').value;

            if (password !== confirmPwd) {
                alert('两次输入的密码不一致！');
                return;
            }
            if (smsCode !== '123456') {
                alert('短信验证码错误！(测试请使用 123456)');
                return;
            }

            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 注册中...';

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, phone, password })
                });
                const res = await response.json();

                if (res.code === 200) {
                    alert('注册成功，请登录');
                    window.location.href = '/login';
                    return;
                }
                alert(res.msg || '注册失败');
            } catch (error) {
                alert(`网络请求失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
