{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h4 class="text-center fw-bold" style="color: #333;">用户登录</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4 d-flex align-items-center">
                        <label class="fw-bold text-nowrap me-3" style="min-width: 80px;">用户名</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="请输入账号" required>
                    </div>
                    <div class="mb-4 d-flex align-items-center">
                        <label class="fw-bold text-nowrap me-3" style="min-width: 80px;">密&emsp;码</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="请输入密码" required>
                    </div>
                    <div class="d-grid gap-2 mt-5">
                        <button type="submit" class="btn btn-primary btn-lg" style="background-color: #ff6b6b; border: none;">登 录</button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-white border-top-0 pb-4 d-flex justify-content-between align-items-center">
                <a href="/" class="text-decoration-none text-secondary small"><i class="fas fa-arrow-left me-1"></i>返回首页</a>
                <small class="text-muted">还没有账号？ <a href="/register" class="text-decoration-none" style="color: #ff6b6b;">立即注册</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
