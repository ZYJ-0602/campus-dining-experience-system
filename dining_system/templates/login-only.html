<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园食堂点评系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff9933;
            --primary-hover: #f08f2d;
            --bg-gradient: linear-gradient(135deg, #ff9933 0%, #ffb366 100%);
            --golden-input-width: 61.8%;
        }

        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .auth-container {
            width: 400px;
            max-width: 400px;
            padding: 0;
        }

        .card-custom {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
        }

        .card-header-custom {
            background: var(--bg-gradient);
            padding: 30px 20px;
            text-align: center;
            color: #fff;
        }

        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .system-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .card-body-custom {
            padding: 28px;
        }

        #loginForm {
            width: 100%;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .golden-row {
            width: var(--golden-input-width);
            margin-left: auto;
            margin-right: auto;
        }

        .form-row:last-of-type {
            margin-bottom: 0;
        }

        .field-wrap {
            position: relative;
            width: 100%;
        }

        .form-control {
            border-radius: 4px;
            width: 100%;
            min-height: 40px;
            padding: 10px 10px 10px 44px;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .form-control.with-toggle {
            padding-right: 34px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(255, 153, 51, 0.12);
        }

        .field-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #b8b8b8;
            width: 20px;
            height: 20px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
            background: transparent;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border: none;
            border-radius: 4px;
            min-height: 40px;
            padding: 9px 12px;
            font-size: 15px;
            font-weight: 600;
            width: var(--golden-input-width);
            display: block;
            margin: 0 auto;
            transition: all 0.2s;
            color: #fff;
        }

        .btn-primary-custom:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary-custom:active {
            transform: translateY(0);
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .link-primary-custom {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .link-primary-custom:hover {
            text-decoration: underline;
        }

        .password-toggle {
            border: none;
            background: transparent;
            cursor: pointer;
            color: #b8b8b8;
            z-index: 10;
            font-size: 14px;
            line-height: 1;
            padding: 0;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        @media (max-width: 576px) {
            .auth-container {
                width: calc(100vw - 24px);
                max-width: 400px;
            }

            :root {
                --golden-input-width: 74%;
            }

            .card-body-custom {
                padding: 24px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card card-custom">
            <div class="card-header-custom">
                <i class="bi bi-shop logo-icon"></i>
                <h1 class="system-title">校园食堂点评系统</h1>
            </div>

            <div class="card-body-custom">
                <form id="loginForm">
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="loginAccount" placeholder="用户名" required>
                        </div>
                    </div>
                    <div class="form-row golden-row">
                        <div class="field-wrap">
                            <span class="field-icon" aria-hidden="true"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control with-toggle" id="loginPassword" placeholder="请输入密码" required>
                            <button type="button" class="position-absolute top-50 end-0 translate-middle-y me-2 password-toggle" id="pwdToggle" aria-label="切换密码可见性"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center form-row golden-row">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-secondary" for="rememberMe">记住我</label>
                        </div>
                        <a href="#" class="small text-secondary text-decoration-none">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary-custom" id="loginBtn">登 录</button>
                </form>

                <div class="auth-footer">
                    <span class="text-secondary">还没有账号？</span>
                    <a href="/register" class="link-primary-custom">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            const icon = iconEl.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        document.getElementById('pwdToggle').addEventListener('click', function() {
            togglePassword('loginPassword', this);
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 登录中...';

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: account, password })
                });
                const res = await response.json();

                if (res.code === 200) {
                    localStorage.setItem('user', JSON.stringify(res.data));
                    localStorage.setItem('isLogin', 'true');
                    window.location.href = '/';
                    return;
                }
                alert(res.msg || '登录失败');
            } catch (error) {
                alert(`网络请求失败: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
