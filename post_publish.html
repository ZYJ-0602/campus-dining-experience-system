<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布笔记</title>
    <!-- 引入 Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入 SortableJS 实现拖拽排序 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-color: #FF69B4; /* 粉色主色调 */
            --bg-color: #f8f9fa;
        }
        
        body {
            background-color: var(--bg-color);
            padding-top: 50px; /* 顶部栏高度 */
            padding-bottom: 30px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 1. 顶部栏 */
        .navbar-custom {
            background-color: #fff;
            height: 50px;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }
        
        .nav-btn {
            font-size: 16px;
            padding: 5px 15px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
        }
        
        .publish-btn {
            background-color: var(--primary-color);
            color: #fff;
            border-radius: 20px;
            padding: 5px 18px;
            font-size: 14px;
            border: none;
        }
        
        .publish-btn:disabled {
            background-color: #ffb6c1; /* 浅粉色禁用态 */
            opacity: 0.8;
        }

        /* 2. 关联对象选择 (级联) */
        .select-group {
            background: #fff;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .select-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .cascade-select {
            display: flex;
            gap: 10px;
        }
        
        .form-select-sm {
            border-radius: 8px;
            border-color: #eee;
        }

        /* 3. 图文编辑模块 */
        .editor-section {
            background: #fff;
            padding: 15px;
            margin-bottom: 10px;
        }

        /* 图片上传区 */
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .upload-btn {
            width: 100%;
            padding-bottom: 100%; /* 正方形 */
            position: relative;
            background: #f8f8f8;
            border: 1px dashed #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .upload-icon-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #999;
        }
        
        .preview-item {
            width: 100%;
            padding-bottom: 100%;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: grab;
        }
        
        .preview-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 18px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        /* 文本输入 */
        .title-input {
            border: none;
            border-bottom: 1px solid #eee;
            border-radius: 0;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .title-input:focus {
            box-shadow: none;
            border-color: var(--primary-color);
        }
        
        .content-input {
            border: none;
            resize: none;
            padding: 0;
            font-size: 15px;
            min-height: 150px;
        }
        
        .content-input:focus {
            box-shadow: none;
        }

        /* 标签 */
        .tags-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .tag-pill {
            padding: 5px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border: 1px solid transparent;
        }
        
        .tag-pill.active {
            background: #fff0f6;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .custom-tag-input {
            width: 100px;
            border: none;
            background: transparent;
            font-size: 13px;
            outline: none;
            color: var(--primary-color);
        }

        /* 底部预览按钮 */
        .preview-bar {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }
        
        .preview-bar:hover {
            color: var(--primary-color);
        }

        /* 预览弹窗 */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .preview-card {
            width: 90%;
            max-width: 375px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .preview-header {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .preview-close {
            font-size: 24px;
            cursor: pointer;
        }
        
        .preview-body {
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .preview-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .preview-content {
            padding: 15px;
        }

        /* Toast */
        .toast-custom {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            z-index: 3000;
        }

    </style>
</head>
<body>

    <!-- 1. 顶部栏 -->
    <nav class="navbar navbar-custom fixed-top px-3 d-flex justify-content-between align-items-center">
        <div class="nav-btn" onclick="goBack()">取消</div>
        <div class="fw-bold">发布笔记</div>
        <button class="publish-btn" id="publishBtn" onclick="publishPost()" disabled>发布</button>
    </nav>

    <!-- 2. 级联选择 -->
    <div class="select-group">
        <div class="select-label"><i class="bi bi-geo-alt me-1"></i>关联位置</div>
        <div class="cascade-select">
            <select class="form-select form-select-sm" id="canteenSelect" onchange="loadWindows()">
                <option value="">选择食堂</option>
                <!-- 动态加载 -->
            </select>
            <select class="form-select form-select-sm" id="windowSelect" onchange="loadDishes()" disabled>
                <option value="">选择窗口</option>
            </select>
            <select class="form-select form-select-sm" id="dishSelect" onchange="autoSave()" disabled>
                <option value="">选择菜品</option>
            </select>
        </div>
    </div>

    <!-- 3. 图文编辑 -->
    <div class="editor-section">
        <!-- 图片上传 -->
        <div class="upload-grid" id="imageGrid">
            <!-- 预览图将插入到这里 -->
            <label class="upload-btn" id="uploadBtn">
                <div class="upload-icon-wrapper">
                    <i class="bi bi-camera fs-3"></i>
                    <div style="font-size:12px">添加图片</div>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFiles(this.files)">
            </label>
        </div>

        <!-- 文字编辑 -->
        <input type="text" class="form-control title-input" id="postTitle" placeholder="填写标题会有更多赞哦～" maxlength="20" oninput="checkPublish()">
        <textarea class="form-control content-input" id="postContent" placeholder="分享你的用餐体验，推荐必点菜/避雷..." oninput="autoSave()"></textarea>

        <!-- 标签 -->
        <div class="tags-wrapper">
            <div class="tag-pill" onclick="toggleTag(this)">#推荐</div>
            <div class="tag-pill" onclick="toggleTag(this)">#避雷</div>
            <div class="tag-pill" onclick="toggleTag(this)">#故事分享</div>
            <div class="tag-pill" style="background:#fff; border:1px dashed #ccc; padding:5px 8px;">
                # <input type="text" class="custom-tag-input" placeholder="自定义标签" onblur="addCustomTag(this)">
            </div>
        </div>
    </div>

    <!-- 4. 底部预览 -->
    <div class="preview-bar" onclick="showPreview()">
        <i class="bi bi-eye me-1"></i> 预览笔记效果
    </div>

    <!-- 预览弹窗 -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-card">
            <div class="preview-header">
                <span class="fw-bold">笔记预览</span>
                <span class="preview-close" onclick="closePreview()">&times;</span>
            </div>
            <div class="preview-body">
                <img src="" class="preview-cover" id="previewCover">
                <div class="preview-content">
                    <h5 class="fw-bold mb-2" id="previewTitle"></h5>
                    <div class="d-flex align-items-center mb-3">
                        <img src="https://via.placeholder.com/30" class="rounded-circle me-2" style="width:25px;height:25px;">
                        <span class="text-muted" style="font-size:12px;">用户名</span>
                    </div>
                    <p class="text-secondary" style="font-size:14px; white-space: pre-wrap;" id="previewText"></p>
                    <div class="text-muted" style="font-size:12px;" id="previewTags"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-custom" id="toast">已保存草稿</div>

    <script>
        // ==========================================
        // 模拟数据 (Mock Data)
        // ==========================================
        const mockData = {
            canteens: ["北区食堂", "南区食堂", "西区食堂"],
            windows: {
                "北区食堂": [{id:1, name:"1号窗口"}, {id:2, name:"2号窗口"}],
                "南区食堂": [{id:3, name:"特色小炒"}, {id:4, name:"面食档"}]
            },
            dishes: {
                "1": [{id:1, name:"番茄炒蛋"}, {id:2, name:"红烧肉"}],
                "3": [{id:3, name:"宫保鸡丁"}, {id:4, name:"麻婆豆腐"}]
            }
        };

        // 全局状态
        let uploadedImages = []; // 存储 Base64 或 File 对象
        let autoSaveTimer = null;

        document.addEventListener('DOMContentLoaded', function() {
            initCascade();
            initSortable();
            loadDraft();
            
            // 自动保存定时器 (每3秒)
            autoSaveTimer = setInterval(autoSave, 3000);
        });

        // 1. 级联选择逻辑
        function initCascade() {
            const canteenSel = document.getElementById('canteenSelect');
            mockData.canteens.forEach(c => {
                canteenSel.add(new Option(c, c));
            });
        }

        function loadWindows() {
            const canteen = document.getElementById('canteenSelect').value;
            const winSel = document.getElementById('windowSelect');
            const dishSel = document.getElementById('dishSelect');
            
            winSel.innerHTML = '<option value="">选择窗口</option>';
            dishSel.innerHTML = '<option value="">选择菜品</option>';
            winSel.disabled = true;
            dishSel.disabled = true;

            if (canteen && mockData.windows[canteen]) {
                mockData.windows[canteen].forEach(w => {
                    winSel.add(new Option(w.name, w.id));
                });
                winSel.disabled = false;
            }
            autoSave();
        }

        function loadDishes() {
            const winId = document.getElementById('windowSelect').value;
            const dishSel = document.getElementById('dishSelect');
            
            dishSel.innerHTML = '<option value="">选择菜品</option>';
            dishSel.disabled = true;

            if (winId && mockData.dishes[winId]) {
                mockData.dishes[winId].forEach(d => {
                    dishSel.add(new Option(d.name, d.id));
                });
                dishSel.disabled = false;
            }
            autoSave();
        }

        // 2. 图片处理 (上传 + 排序)
        function handleFiles(files) {
            if (uploadedImages.length + files.length > 9) {
                alert("最多上传9张图片");
                return;
            }

            Array.from(files).forEach(file => {
                // 简单压缩模拟：直接读取
                const reader = new FileReader();
                reader.onload = (e) => {
                    addImageToGrid(e.target.result);
                };
                reader.readAsDataURL(file);
            });
        }

        function addImageToGrid(base64) {
            uploadedImages.push(base64);
            renderImages();
            checkPublish();
            autoSave();
        }

        function renderImages() {
            // 清除现有预览（除了上传按钮）
            const grid = document.getElementById('imageGrid');
            const btn = document.getElementById('uploadBtn');
            
            // 移除所有 preview-item
            grid.querySelectorAll('.preview-item').forEach(el => el.remove());

            // 重新插入
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${img}" class="preview-img">
                    <div class="delete-btn" onclick="removeImage(${index})">&times;</div>
                `;
                grid.insertBefore(div, btn);
            });

            // 达到9张隐藏上传按钮
            btn.style.display = uploadedImages.length >= 9 ? 'none' : 'block';
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImages();
            checkPublish();
            autoSave();
        }

        function initSortable() {
            new Sortable(document.getElementById('imageGrid'), {
                animation: 150,
                draggable: ".preview-item",
                onEnd: function (evt) {
                    // 更新数组顺序
                    const item = uploadedImages.splice(evt.oldIndex, 1)[0];
                    uploadedImages.splice(evt.newIndex, 0, item);
                    autoSave();
                }
            });
        }

        // 3. 标签逻辑
        function toggleTag(el) {
            el.classList.toggle('active');
            autoSave();
        }

        function addCustomTag(input) {
            const val = input.value.trim();
            if (val) {
                const wrapper = document.querySelector('.tags-wrapper');
                const newTag = document.createElement('div');
                newTag.className = 'tag-pill active';
                newTag.innerText = '#' + val;
                newTag.onclick = function() { this.classList.toggle('active'); autoSave(); };
                wrapper.insertBefore(newTag, input.parentElement);
                input.value = '';
                autoSave();
            }
        }

        // 4. 发布校验
        function checkPublish() {
            const title = document.getElementById('postTitle').value.trim();
            // 规则：标题必填 + (至少1张图 或 正文不为空)
            const hasContent = document.getElementById('postContent').value.trim().length > 0;
            const hasImg = uploadedImages.length > 0;
            
            const btn = document.getElementById('publishBtn');
            btn.disabled = !(title.length > 0 && (hasImg || hasContent));
        }

        function publishPost() {
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerText = "发布中...";

            // 模拟 API
            setTimeout(() => {
                showToast("发布成功，待审核");
                localStorage.removeItem('post_draft'); // 清除草稿
                setTimeout(() => {
                    // window.location.href = 'index.html';
                    btn.innerText = "发布"; // 仅演示重置
                    btn.disabled = false;
                }, 1500);
            }, 1000);
        }

        // 5. 草稿箱逻辑
        function autoSave() {
            const draft = {
                canteen: document.getElementById('canteenSelect').value,
                window: document.getElementById('windowSelect').value,
                dish: document.getElementById('dishSelect').value,
                title: document.getElementById('postTitle').value,
                content: document.getElementById('postContent').value,
                images: uploadedImages, // 注意：Base64可能会很大，真实场景建议仅保存核心文本或限制大小
                // 标签暂略
            };
            localStorage.setItem('post_draft', JSON.stringify(draft));
            // showToast("草稿已保存"); // 频繁提示会打扰，这里静默保存
        }

        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('post_draft'));
            if (draft) {
                if (draft.canteen) {
                    document.getElementById('canteenSelect').value = draft.canteen;
                    loadWindows(); // 触发加载下级
                    // 这是一个异步问题，简单演示可能无法立即回填下级
                    // 真实场景需配合 Promise
                }
                document.getElementById('postTitle').value = draft.title || '';
                document.getElementById('postContent').value = draft.content || '';
                if (draft.images && draft.images.length > 0) {
                    uploadedImages = draft.images;
                    renderImages();
                }
                checkPublish();
            }
        }

        // 6. 预览逻辑
        function showPreview() {
            const title = document.getElementById('postTitle').value || "无标题";
            const content = document.getElementById('postContent').value || "无正文内容";
            const cover = uploadedImages.length > 0 ? uploadedImages[0] : "https://via.placeholder.com/300x200?text=No+Image";
            
            // 收集标签
            const tags = [];
            document.querySelectorAll('.tag-pill.active').forEach(t => tags.push(t.innerText));

            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewText').innerText = content;
            document.getElementById('previewCover').src = cover;
            document.getElementById('previewTags').innerText = tags.join(" ");

            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }

        function goBack() {
            if (confirm("确定要取消发布吗？草稿将保留。")) {
                window.history.back();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

    </script>
</body>
</html>
