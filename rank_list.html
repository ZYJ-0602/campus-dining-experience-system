<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食堂榜单</title>
    <!-- 引入 Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #FF7F24; /* 核心橙色 */
            --bg-color: #f8f9fa;
        }
        
        body {
            background-color: var(--bg-color);
            padding-top: 50px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 1. 顶部栏 */
        .navbar-custom {
            background-color: #fff;
            height: 50px;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }
        
        .nav-title {
            font-size: 18px;
            font-weight: bold;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .nav-icon {
            font-size: 22px;
            color: #333;
            cursor: pointer;
            padding: 5px;
        }

        .filter-dropdown {
            font-size: 14px;
            color: #666;
            cursor: pointer;
            padding: 5px 10px;
            background: #f0f0f0;
            border-radius: 15px;
        }

        /* 2. 榜单切换模块 */
        .tab-bar {
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .tab-item {
            padding: 12px 0;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            position: relative;
            flex: 1;
            text-align: center;
        }
        
        .tab-item.active {
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        /* 3. 可视化图表模块 */
        .chart-card {
            background: #fff;
            margin: 15px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        
        .chart-subtitle {
            font-size: 12px;
            color: #999;
        }

        #rankChart {
            width: 100%;
            height: 350px; /* 足够容纳 Top10 */
        }

        /* 4. 榜单说明模块 */
        .footer-info {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
        }
        
        .load-more-btn {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

    </style>
</head>
<body>

    <!-- 1. 顶部栏 -->
    <nav class="navbar navbar-custom fixed-top px-3 d-flex justify-content-between align-items-center">
        <i class="bi bi-chevron-left nav-icon" onclick="history.back()"></i>
        <div class="nav-title">食堂榜单</div>
        <div class="dropdown">
            <div class="filter-dropdown dropdown-toggle" id="timeFilterBtn" data-bs-toggle="dropdown">
                近7天
            </div>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item active" href="#" onclick="changeTime(7, this)">近7天</a></li>
                <li><a class="dropdown-item" href="#" onclick="changeTime(30, this)">近30天</a></li>
            </ul>
        </div>
    </nav>

    <!-- 2. 榜单切换模块 -->
    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('note', this)">颜值巅峰榜</div>
        <div class="tab-item" onclick="switchTab('food', this)">老饕必吃榜</div>
        <div class="tab-item" onclick="switchTab('service', this)">服务标兵榜</div>
    </div>

    <!-- 3. 可视化图表模块 -->
    <div class="chart-card">
        <div class="chart-header">
            <div class="chart-title" id="chartTitle">笔记点赞 TOP10</div>
            <div class="chart-subtitle" id="chartSubtitle">数据来源：笔记互动</div>
        </div>
        <div id="rankChart"></div>
    </div>

    <!-- 4. 榜单说明模块 -->
    <div class="footer-info">
        <div>榜单数据基于<span id="timeRangeText">近7天</span>用户评价/互动生成，每日更新</div>
        <a href="#" class="load-more-btn" onclick="alert('跳转完整榜单页')">查看完整榜单 ></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ==========================================
        // 模拟数据 (Mock Data)
        // ==========================================
        const mockData = {
            // 颜值巅峰榜 (笔记点赞)
            note: [
                { name: "番茄炒蛋封神！", value: 1280, id: 1 },
                { name: "红烧肉YYDS", value: 1024, id: 2 },
                { name: "麻辣香锅测评", value: 980, id: 3 },
                { name: "早餐包子推荐", value: 850, id: 4 },
                { name: "避雷指南", value: 720, id: 5 },
                { name: "西区新窗口", value: 650, id: 6 },
                { name: "油泼面", value: 580, id: 7 },
                { name: "糖醋排骨", value: 420, id: 8 },
                { name: "瓦罐汤", value: 360, id: 9 },
                { name: "铁板饭", value: 300, id: 10 }
            ],
            // 老饕必吃榜 (菜品评分)
            food: [
                { name: "番茄炒蛋", value: 9.8, id: 1 },
                { name: "红烧肉", value: 9.6, id: 2 },
                { name: "宫保鸡丁", value: 9.5, id: 3 },
                { name: "麻婆豆腐", value: 9.3, id: 4 },
                { name: "清蒸鱼", value: 9.1, id: 5 },
                { name: "回锅肉", value: 8.9, id: 6 },
                { name: "酸菜鱼", value: 8.7, id: 7 },
                { name: "口水鸡", value: 8.5, id: 8 },
                { name: "土豆丝", value: 8.2, id: 9 },
                { name: "青椒肉丝", value: 8.0, id: 10 }
            ],
            // 服务标兵榜 (窗口服务分)
            service: [
                { name: "1号窗口", value: 9.9, id: 1 },
                { name: "特色小炒", value: 9.7, id: 2 },
                { name: "面食档", value: 9.5, id: 3 },
                { name: "麻辣香锅", value: 9.4, id: 4 },
                { name: "清真窗口", value: 9.2, id: 5 },
                { name: "盖浇饭", value: 9.0, id: 6 },
                { name: "早餐铺", value: 8.8, id: 7 },
                { name: "饮料吧", value: 8.6, id: 8 },
                { name: "水果捞", value: 8.4, id: 9 },
                { name: "炸鸡店", value: 8.1, id: 10 }
            ]
        };

        // 配置项映射
        const configMap = {
            note: { title: "笔记点赞 TOP10", subtitle: "数据来源：笔记互动", yName: "点赞数", color: "#FF69B4" },
            food: { title: "菜品评分 TOP10", subtitle: "数据来源：用户打分", yName: "平均分", color: "#FF7F24" },
            service: { title: "窗口服务 TOP10", subtitle: "数据来源：服务评分", yName: "服务分", color: "#FFA500" }
        };

        // 全局变量
        let myChart = null;
        let currentType = 'note';
        let currentTime = 7;

        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            updateChart();
        });

        // 1. 初始化图表
        function initChart() {
            myChart = echarts.init(document.getElementById('rankChart'));
            window.addEventListener('resize', () => myChart.resize());
            
            // 点击事件
            myChart.on('click', function(params) {
                const item = mockData[currentType][params.dataIndex];
                const target = currentType === 'note' ? 'post_detail.html' : 
                               currentType === 'food' ? 'dish_detail.html' : 'canteen_detail.html'; // 假设窗口跳食堂页
                alert(`跳转详情页：${target}?id=${item.id}`);
                // window.location.href = `${target}?id=${item.id}`;
            });
        }

        // 2. 更新图表数据
        function updateChart() {
            const data = mockData[currentType];
            const config = configMap[currentType];

            // 更新标题
            document.getElementById('chartTitle').innerText = config.title;
            document.getElementById('chartSubtitle').innerText = config.subtitle;

            // 模拟数据微调 (根据时间范围)
            const displayData = data.map(item => ({
                ...item,
                value: currentTime === 7 ? item.value : (item.value * 1.2).toFixed(1) // 30天数据略多
            }));

            const option = {
                grid: {
                    top: '10%',
                    left: '3%',
                    right: '10%',
                    bottom: '3%',
                    containLabel: true
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                xAxis: {
                    type: 'value',
                    name: config.yName,
                    splitLine: { lineStyle: { type: 'dashed' } }
                },
                yAxis: {
                    type: 'category',
                    data: displayData.map(i => i.name).reverse(), // 倒序展示，Top1在最上
                    axisLabel: {
                        width: 90,
                        overflow: 'truncate', // 文字过长省略
                        interval: 0
                    }
                },
                series: [{
                    name: config.yName,
                    type: 'bar',
                    data: displayData.map(i => i.value).reverse(),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#FFD3A5' }, // 浅橙
                            { offset: 1, color: config.color }  // 深色
                        ]),
                        borderRadius: [0, 10, 10, 0]
                    },
                    label: {
                        show: true,
                        position: 'right',
                        valueAnimation: true
                    },
                    barWidth: '60%'
                }]
            };

            myChart.setOption(option);
        }

        // 3. 切换榜单
        function switchTab(type, btn) {
            currentType = type;
            
            // 更新Tab样式
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            
            updateChart();
        }

        // 4. 切换时间
        function changeTime(days, btn) {
            currentTime = days;
            
            // 更新按钮文本
            document.getElementById('timeFilterBtn').innerText = `近${days}天`;
            document.getElementById('timeRangeText').innerText = `近${days}天`;
            
            // 更新下拉菜单选中态
            document.querySelectorAll('.dropdown-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            
            updateChart();
        }

    </script>
</body>
</html>
