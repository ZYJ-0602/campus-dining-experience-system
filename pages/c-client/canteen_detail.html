<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食堂详情</title>
    <!-- 引入 Bootstrap 5 CDN -->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #FF7F24; /* 核心橙色 */
            --bg-color: #f8f9fa;
        }
        
        body {
            background-color: var(--bg-color);
            padding-top: 50px; /* 顶部栏高度 */
            padding-bottom: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 1. 顶部栏 */
        .navbar-custom {
            background-color: #fff;
            height: 50px;
            border-bottom: 1px solid #eee;
            z-index: 1000;
        }
        
        .nav-title {
            font-size: 18px;
            font-weight: bold;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .nav-icon {
            font-size: 22px;
            color: #333;
            cursor: pointer;
            padding: 5px;
        }
        
        .star-active {
            color: #FFD700 !important; /* 金黄色 */
        }

        /* 2. 食堂概览 */
        .overview-card {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-icon {
            color: var(--primary-color);
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }

        #radarChart {
            width: 100%;
            height: 220px;
            margin: 10px 0;
        }
        
        .eval-count-btn {
            display: block;
            text-align: center;
            font-size: 13px;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            padding: 5px;
            margin-top: 5px;
            text-decoration: none;
        }

        /* 通用模块标题 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            margin-bottom: 10px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        
        .section-more {
            font-size: 12px;
            color: #999;
            text-decoration: none;
        }

        /* 3. 窗口列表 */
        .window-list {
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .window-card {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .window-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .window-meta {
            font-size: 12px;
            color: #666;
        }
        
        .window-score {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 4. 食安公示 */
        .safety-list {
            padding: 0 15px;
            margin-bottom: 20px;
        }
        
        .safety-item {
            background: #fff;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .safety-item:first-child { border-radius: 8px 8px 0 0; }
        .safety-item:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
        
        .safety-icon {
            font-size: 20px;
            color: #28a745;
            margin-right: 10px;
        }

        /* 5. 关联笔记 (横向滚动) */
        .note-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 15px 15px;
            scroll-behavior: smooth;
        }
        
        .note-scroll::-webkit-scrollbar { display: none; }
        
        .note-card {
            flex: 0 0 140px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        
        .note-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }
        
        .note-info {
            padding: 8px;
        }
        
        .note-title {
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }
        
        .note-likes {
            font-size: 12px;
            color: #999;
        }

        /* 弹窗 */
        .modal-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content-custom {
            width: 85%;
            max-width: 350px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            padding: 20px;
            text-align: center;
        }

        .cert-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 10px;
            background: #f8f8f8;
        }

    </style>
    <link href="../../static/css/common.css" rel="stylesheet">
</head>
<body>

    <!-- 1. 顶部栏 -->
    <nav class="navbar navbar-custom fixed-top px-3 d-flex justify-content-between align-items-center">
        <i class="bi bi-chevron-left nav-icon" onclick="history.back()"></i>
        <div class="nav-title" id="navTitle">食堂详情</div>
        <i class="bi bi-star nav-icon" id="starBtn" onclick="toggleStar()"></i>
    </nav>

    <!-- 2. 食堂概览 -->
    <div class="overview-card">
        <div class="info-row">
            <i class="bi bi-geo-alt-fill info-icon"></i>
            <span id="canteenAddr">加载中...</span>
        </div>
        <div class="info-row">
            <i class="bi bi-clock-fill info-icon"></i>
            <span id="canteenTime">--</span>
        </div>
        
        <!-- 雷达图容器 -->
        <div id="radarChart"></div>
        
        <a href="#" class="eval-count-btn" onclick="alert('跳转评价列表')">
            查看全部 <span id="evalCount">0</span> 条评价 <i class="bi bi-chevron-right"></i>
        </a>
    </div>

    <!-- 3. 窗口列表 -->
    <div class="section-header">
        <div class="section-title">食堂窗口</div>
        <a href="#" class="section-more">全部 ></a>
    </div>
    <div class="window-list" id="windowList">
        <!-- 动态插入 -->
    </div>

    <!-- 4. 食安公示 -->
    <div class="section-header">
        <div class="section-title">食安公示</div>
        <a href="#" class="section-more" onclick="alert('跳转公示汇总页')">查看更多 ></a>
    </div>
    <div class="safety-list" id="safetyList">
        <!-- 动态插入 -->
    </div>

    <!-- 5. 关联笔记 -->
    <div class="section-header">
        <div class="section-title">用户分享</div>
    </div>
    <div class="note-scroll" id="noteList">
        <!-- 动态插入 -->
    </div>

    <!-- 食安详情弹窗 -->
    <div class="modal-custom" id="safetyModal">
        <div class="modal-content-custom">
            <h5 class="mb-3 fw-bold" id="modalTitle">证书详情</h5>
            <img src="" class="cert-img" id="modalImg">
            <div class="text-start fs-6 mb-3">
                <div>有效期至：<span id="modalDate">--</span></div>
                <div class="text-success mt-1"><i class="bi bi-check-circle-fill"></i> 状态正常</div>
            </div>
            <button class="btn btn-primary w-100" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 模拟数据 (Mock Data)
        // ==========================================
        const mockDetail = {
            name: "北区食堂",
            address: "教学楼北侧",
            business_time: "06:30 - 21:00",
            avg_scores: { food: 8.5, environment: 8.2, service: 8.8, safety: 9.0 },
            eval_count: 1280,
            is_starred: false
        };

        const mockWindows = [
            { id: 1, name: "1号窗口 (自选快餐)", avg_score: 8.6, dish_count: 12 },
            { id: 2, name: "2号窗口 (特色面食)", avg_score: 9.1, dish_count: 8 },
            { id: 3, name: "3号窗口 (麻辣香锅)", avg_score: 8.2, dish_count: 20 }
        ];

        const mockSafety = [
            { name: "食品经营许可证", valid_end: "2024-12-31", img: "https://via.placeholder.com/300x400?text=License" },
            { name: "主要食材检测报告", valid_end: "2024-06-01", img: "https://via.placeholder.com/300x400?text=Report" }
        ];

        const mockNotes = [
            { id: 1, title: "北区红烧肉yyds", likes: 128, img: "https://via.placeholder.com/140x100/FFE4B5/333" },
            { id: 2, title: "千万别去3号窗口排队", likes: 56, img: "https://via.placeholder.com/140x100/E6E6FA/333" },
            { id: 3, title: "早餐包子测评", likes: 88, img: "https://via.placeholder.com/140x100/FFC0CB/333" }
        ];

        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const canteenName = urlParams.get('name') || "北区食堂"; // 默认测试值

        document.addEventListener('DOMContentLoaded', function() {
            initPageData();
            initChart();
            renderWindows();
            renderSafety();
            renderNotes();
        });

        // 1. 初始化页面基础信息
        function initPageData() {
            // 模拟 API: GET /api/canteen/detail
            document.title = canteenName;
            document.getElementById('navTitle').innerText = canteenName;
            
            document.getElementById('canteenAddr').innerText = mockDetail.address;
            document.getElementById('canteenTime').innerText = mockDetail.business_time;
            document.getElementById('evalCount').innerText = mockDetail.eval_count;
            
            updateStarBtn();
        }

        // 2. 初始化雷达图 (ECharts)
        function initChart() {
            const chart = echarts.init(document.getElementById('radarChart'));
            const option = {
                radar: {
                    indicator: [
                        { name: '食品口味', max: 10 },
                        { name: '环境卫生', max: 10 },
                        { name: '服务态度', max: 10 },
                        { name: '食安合规', max: 10 }
                    ],
                    radius: '70%',
                    splitNumber: 4,
                    splitArea: { areaStyle: { color: ['#fff', '#fff', '#fff', '#fff'] } },
                    axisLine: { lineStyle: { color: '#ddd' } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: [
                            mockDetail.avg_scores.food,
                            mockDetail.avg_scores.environment,
                            mockDetail.avg_scores.service,
                            mockDetail.avg_scores.safety
                        ],
                        name: '评分',
                        areaStyle: { color: 'rgba(255, 127, 36, 0.3)' }, // 橙色半透明
                        lineStyle: { color: '#FF7F24', width: 2 },
                        itemStyle: { color: '#FF7F24' }
                    }]
                }]
            };
            chart.setOption(option);
            
            // 自适应宽度
            window.addEventListener('resize', () => chart.resize());
        }

        // 3. 渲染窗口列表
        function renderWindows() {
            const list = document.getElementById('windowList');
            mockWindows.forEach(w => {
                const item = document.createElement('div');
                item.className = 'window-card';
                item.innerHTML = `
                    <div>
                        <div class="window-name">${w.name}</div>
                        <div class="window-meta">菜品数量：${w.dish_count}</div>
                    </div>
                    <div class="text-end">
                        <div class="window-score">${w.avg_score}</div>
                        <div class="window-meta">综合评分</div>
                    </div>
                `;
                item.onclick = () => alert(`跳转窗口详情 ID:${w.id}`);
                list.appendChild(item);
            });
        }

        // 4. 渲染食安公示
        function renderSafety() {
            const list = document.getElementById('safetyList');
            mockSafety.forEach(s => {
                const item = document.createElement('div');
                item.className = 'safety-item';
                item.innerHTML = `
                    <i class="bi bi-shield-check safety-icon"></i>
                    <div class="flex-grow-1">
                        <div class="fw-bold" style="font-size:14px;">${s.name}</div>
                        <div class="text-muted" style="font-size:12px;">有效期至：${s.valid_end}</div>
                    </div>
                    <i class="bi bi-chevron-right text-muted"></i>
                `;
                item.onclick = () => showModal(s);
                list.appendChild(item);
            });
        }

        // 5. 渲染笔记
        function renderNotes() {
            const list = document.getElementById('noteList');
            mockNotes.forEach(n => {
                const item = document.createElement('div');
                item.className = 'note-card';
                item.innerHTML = `
                    <img src="${n.img}" class="note-img">
                    <div class="note-info">
                        <div class="note-title">${n.title}</div>
                        <div class="note-likes"><i class="bi bi-heart"></i> ${n.likes}</div>
                    </div>
                `;
                item.onclick = () => window.location.href = `post_detail.html?id=${n.id}`;
                list.appendChild(item);
            });
        }

        // 交互逻辑
        function toggleStar() {
            mockDetail.is_starred = !mockDetail.is_starred;
            updateStarBtn();
            // 模拟 API 调用
        }

        function updateStarBtn() {
            const btn = document.getElementById('starBtn');
            if (mockDetail.is_starred) {
                btn.classList.replace('bi-star', 'bi-star-fill');
                btn.classList.add('star-active');
            } else {
                btn.classList.replace('bi-star-fill', 'bi-star');
                btn.classList.remove('star-active');
            }
        }

        function showModal(data) {
            document.getElementById('modalTitle').innerText = data.name;
            document.getElementById('modalDate').innerText = data.valid_end;
            document.getElementById('modalImg').src = data.img;
            document.getElementById('safetyModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('safetyModal').style.display = 'none';
        }

    </script>
    <script src="../../static/js/common.js"></script>
</body>
</html>
